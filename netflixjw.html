<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HLS JW NETFLIX SKIN</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Adlidziliqram/Adlidziliqram.github.io@main/test/style.css">
    <script src='https://cdn.jsdelivr.net/gh/Adlidziliqram/Adlidziliqram.github.io@main/test/Jq6HIbgz.js'></script>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            background: #000;
            overflow: hidden;
        }

        /* 16:9 adaptive wrapper */
        #player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
        }

        @supports not (aspect-ratio: 16 / 9) {
            #player-wrapper {
                height: 0;
                padding-top: 56.25%;
            }
        }

        #player {
            position: absolute;
            inset: 0;
            width: 100% !important;
            height: 100% !important;
            background: #000;
        }

        .jwplayer {
            width: 100% !important;
            height: 100% !important;
            background: #000 !important;
        }

        /* poster */
        .jw-preview,
        .jw-preview-image {
            background-size: cover !important;
            background-position: center center !important;
            background-repeat: no-repeat !important;
        }

        /* video */
        .jw-video,
        .jw-video video,
        video {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
            background: #000 !important;
        }

        /* fullscreen */
        .jwplayer.jw-flag-fullscreen,
        .jwplayer.jw-flag-fullscreen video {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: contain !important;
            background: #000 !important;
        }

        /* remove subtitles */
        .jw-text-track-display,
        .jw-captions {
            display: none !important;
        }

        .jw-button-container {
            display: flex !important;
            align-items: center !important;
        }

        .jw-slider-time {
            display: flex !important;
            flex: 1 1 auto !important;
            min-width: 120px !important;
        }

        .jw-slider-time:empty::before {
            content: "";
            display: block;
            width: 100%;
            height: 4px;
            opacity: 0;
        }

        /* WATERMARK */
        .player-watermark {
            position: absolute;
            z-index: 999999;
            pointer-events: none;
        }

        .player-watermark img {
            display: block;
        }

        @media (max-width: 768px) {

            body {
                margin: 0;
                padding: 0;
                background: #000;
            }

            #player-wrapper {
                width: 100vw;
                max-width: 100vw;
                margin: 0;
            }

            .jw-button-container {
                flex-wrap: nowrap !important;
            }

            .jw-slider-time {
                min-width: 0 !important;
                width: auto !important;
                flex: 1 1 1px !important;
            }

            .jw-icon-playback {
                display: flex !important;
                visibility: visible !important;
                opacity: 1 !important;
                min-width: 32px !important;
            }
        }
    </style>
</head>

<body>

<div id="player-wrapper">
    <div id="player"></div>
</div>

<script>
const playerInstance = jwplayer("player").setup({
    controls: true,
    sharing: false,
    displaytitle: true,
    displaydescription: true,
    abouttext: "",
    aboutlink: "",

    stretching: "uniform",

    skin: {
        name: "netflix"
    },

    // disable default JW logo fully
    logo: {
        file: "",
        hide: true
    },

    playlist: [{
        title: "4874 0700 5215 1618",
        description: "ПОДЯКА ЗА ТРАНСЛЯЦІЮ:",

        image: "https://www.betaura.com.ua/wp-content/uploads/2026/05/kolos-obolon-16x9-1-1536x864.webp",

        sources: [{
            label: 'HD',
            type: 'hls',
            file: "https://betkinglive.online/betking/video.m3u8",
            default: true
        }]
    }]
});

playerInstance.on("ready", function() {

    const wrapper = document.getElementById("player-wrapper");

    /* ===== WATERMARK (FULL CONTROL) ===== */
    const wmContainer = document.createElement("div");
    wmContainer.className = "player-watermark";

    const wmImg = document.createElement("img");
    wmImg.src = "https://kasta-sports-tv.github.io/iptv/logo/player-logo.jpg";

    wmContainer.appendChild(wmImg);
    wrapper.appendChild(wmContainer);

    function updateWatermark() {

        const isFullscreen = document.fullscreenElement ||
            document.querySelector(".jw-flag-fullscreen");

        const isDesktop = window.innerWidth > 768;

        if (isFullscreen) {

            if (isDesktop) {
                wmImg.style.width = "320px";
                wmContainer.style.top = "5%";
                wmContainer.style.right = "2%";
            } else {
                wmImg.style.width = "140px";
                wmContainer.style.top = "2%";
                wmContainer.style.right = "4%";
            }

        } else {

            if (isDesktop) {
                wmImg.style.width = "240px";
                wmContainer.style.top = "2%";
                wmContainer.style.right = "2%";
            } else {
                wmImg.style.width = "90px";
                wmContainer.style.top = "2%";
                wmContainer.style.right = "2%";
            }
        }

        // always keep inside correct root (fix JW fullscreen DOM swap)
        const fs = document.querySelector(".jw-flag-fullscreen");
        if (fs && wmContainer.parentElement !== fs) {
            fs.appendChild(wmContainer);
        } else if (!fs && wmContainer.parentElement !== wrapper) {
            wrapper.appendChild(wmContainer);
        }
    }

    updateWatermark();

    playerInstance.on("fullscreen", updateWatermark);
    window.addEventListener("resize", updateWatermark);

    /* ===== KEEP YOUR ORIGINAL CONTROL FIXES ===== */

    const playerContainer = playerInstance.getContainer();

    const buttonContainer =
        playerContainer.querySelector(".jw-button-container");

    const spacer =
        buttonContainer.querySelector(".jw-spacer");

    const timeSlider =
        playerContainer.querySelector(".jw-slider-time");

    if (
        buttonContainer &&
        spacer &&
        timeSlider &&
        window.innerWidth > 768
    ) {
        buttonContainer.replaceChild(timeSlider, spacer);
    }

    if (
        buttonContainer &&
        !timeSlider &&
        window.innerWidth > 768
    ) {
        const fakeSlider = document.createElement("div");

        fakeSlider.className = "jw-slider-time";

        fakeSlider.style.flex = "1 1 auto";
        fakeSlider.style.minWidth = "120px";
        fakeSlider.style.height = "4px";
        fakeSlider.style.opacity = "0";
        fakeSlider.style.pointerEvents = "none";

        buttonContainer.insertBefore(
            fakeSlider,
            buttonContainer.children[3]
        );
    }

    if (window.innerWidth <= 768) {

        const playButton =
            playerContainer.querySelector(".jw-icon-playback");

        if (playButton) {
            playButton.style.display = "flex";
            playButton.style.visibility = "visible";
            playButton.style.opacity = "1";
        }
    }

    const rewindContainer =
        playerContainer.querySelector(".jw-display-icon-rewind");

    if (rewindContainer) {

        const forwardContainer =
            rewindContainer.cloneNode(true);

        const forwardDisplayButton =
            forwardContainer.querySelector(".jw-icon-rewind");

        forwardDisplayButton.style.transform = "scaleX(-1)";
        forwardDisplayButton.ariaLabel = "Forward 10 Seconds";

        const nextContainer =
            playerContainer.querySelector(".jw-display-icon-next");

        if (nextContainer) {
            nextContainer.parentNode.insertBefore(
                forwardContainer,
                nextContainer
            );
        }

        const nextButton =
            playerContainer.querySelector(".jw-display-icon-next");

        if (nextButton) {
            nextButton.style.display = "none";
        }

        const rewindControlBarButton =
            buttonContainer.querySelector(".jw-icon-rewind");

        if (rewindControlBarButton) {

            const forwardControlBarButton =
                rewindControlBarButton.cloneNode(true);

            forwardControlBarButton.style.transform = "scaleX(-1)";
            forwardControlBarButton.ariaLabel = "Forward 10 Seconds";

            rewindControlBarButton.parentNode.insertBefore(
                forwardControlBarButton,
                rewindControlBarButton.nextElementSibling
            );

            [forwardDisplayButton, forwardControlBarButton].forEach((button) => {

                button.onclick = () => {

                    const duration = playerInstance.getDuration();

                    if (duration && duration !== Infinity) {
                        playerInstance.seek(
                            playerInstance.getPosition() + 10
                        );
                    }
                };
            });
        }
    }

});
</script>

</body>
</html>
