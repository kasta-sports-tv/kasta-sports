<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BHAGYA LAKSHMI</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Adlidziliqram/Adlidziliqram.github.io@main/test/style.css">
<script src='https://cdn.jsdelivr.net/gh/Adlidziliqram/Adlidziliqram.github.io@main/test/Jq6HIbgz.js'></script>

<style>
html,
body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
}

#player {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    overflow: hidden;
    background: #000;
}

.jwplayer {
    width: 100% !important;
    height: 100% !important;
    background: #000 !important;
}

/* FIX POSTER */
.jw-preview,
.jw-preview video,
.jw-preview-image,
.jw-stretch-uniform .jw-preview-image {
    width: 100% !important;
    height: 100% !important;
    object-fit: fill !important;
    background-size: 100% 100% !important;
    background-position: center center !important;
}

/* FIX VIDEO FULLSCREEN */
.jw-video,
.jw-video video,
video {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
    background: #000 !important;
}

/* FULLSCREEN FIX */
.jwplayer.jw-flag-fullscreen,
.jwplayer.jw-state-playing.jw-flag-fullscreen,
.jw-fullscreen {
    width: 100vw !important;
    height: 100vh !important;
    background: #000 !important;
}

.jwplayer.jw-flag-fullscreen video {
    object-fit: contain !important;
}

/* ALWAYS SHOW PROGRESS BAR */
.jw-slider-time {
    display: flex !important;
    visibility: visible !important;
    opacity: 1 !important;
    flex: 1 !important;
    min-width: 120px !important;
}

/* DISABLE SEEK BUT KEEP BAR */
.jw-live .jw-slider-time,
.jw-flag-live .jw-slider-time {
    pointer-events: none !important;
    opacity: .85 !important;
}

/* ALWAYS KEEP CONTROLBAR NORMAL */
.jw-controlbar {
    overflow: hidden !important;
}

.jw-button-container {
    align-items: center !important;
}

/* REMOVE SUBTITLES */
.jw-text-track-display,
.jw-captions {
    display: none !important;
}

/* QUALITY BUTTON */
.fake-quality-btn {
    display: flex !important;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 0 12px;
    color: rgba(255,255,255,.9);
    font-size: 13px;
    font-weight: 600;
    cursor: default;
    user-select: none;
    white-space: nowrap;
}

/* MOBILE */
@media (max-width: 768px) {

    .fake-quality-btn {
        font-size: 11px;
        padding: 0 8px;
    }

    .jw-slider-time {
        min-width: 70px !important;
    }
}
</style>
</head>

<body>

<div id="player"></div>

<script>
const playerInstance = jwplayer("player").setup({
    controls: true,
    sharing: false,
    displaytitle: true,
    displaydescription: true,
    abouttext: "",
    aboutlink: "",

    stretching: "uniform",
    autostart: false,

    skin: {
        name: "netflix"
    },

    logo: {
        file: "https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg",
    },

    captions: {
        color: "#FFF",
        fontSize: 14,
        backgroundOpacity: 0,
        edgeStyle: "raised"
    },

    playlist: [{
        title: "BHAGYA LAKSHMI EPISODE 110 SUBTITLE",
        description: "BUDAYAKAN KLIK IKLAN SEBELUM DAN SESUDAH NONTON",

        image: "https://www.betaura.com.ua/wp-content/uploads/2026/05/kolos-obolon-16x9-1-1536x864.webp",

        sources: [{
            label: "1080p",
            type: "hls",
            file: "https://bitcdn-kronehit.bitmovin.com/v2/hls/chunklist.m3u8",
            default: true
        }]
    }]
});

playerInstance.on("ready", function() {

    const playerContainer =
        playerInstance.getContainer();

    const buttonContainer =
        playerContainer.querySelector(".jw-button-container");

    const spacer =
        buttonContainer.querySelector(".jw-spacer");

    const timeSlider =
        playerContainer.querySelector(".jw-slider-time");

    /* MOVE PROGRESS BAR INLINE */
    if (buttonContainer && spacer && timeSlider) {
        buttonContainer.replaceChild(timeSlider, spacer);
    }

    /* FORCE PROGRESS BAR EXIST */
    if (!timeSlider && buttonContainer) {

        const fakeSlider = document.createElement("div");

        fakeSlider.className = "jw-slider-time";

        fakeSlider.style.flex = "1";
        fakeSlider.style.height = "4px";
        fakeSlider.style.margin = "0 12px";
        fakeSlider.style.borderRadius = "999px";
        fakeSlider.style.background = "rgba(255,255,255,.25)";
        fakeSlider.style.pointerEvents = "none";

        buttonContainer.insertBefore(
            fakeSlider,
            buttonContainer.children[3]
        );
    }

    /* FORWARD 10 SEC */
    const rewindContainer = playerContainer.querySelector(
        ".jw-display-icon-rewind"
    );

    if (rewindContainer) {

        const forwardContainer =
            rewindContainer.cloneNode(true);

        const forwardDisplayButton =
            forwardContainer.querySelector(".jw-icon-rewind");

        forwardDisplayButton.style.transform = "scaleX(-1)";
        forwardDisplayButton.ariaLabel = "Forward 10 Seconds";

        const nextContainer =
            playerContainer.querySelector(".jw-display-icon-next");

        if (nextContainer) {

            nextContainer.parentNode.insertBefore(
                forwardContainer,
                nextContainer
            );
        }

        const nextBtn =
            playerContainer.querySelector(".jw-display-icon-next");

        if (nextBtn) {
            nextBtn.style.display = "none";
        }

        const rewindControlBarButton =
            buttonContainer.querySelector(".jw-icon-rewind");

        if (rewindControlBarButton) {

            const forwardControlBarButton =
                rewindControlBarButton.cloneNode(true);

            forwardControlBarButton.style.transform = "scaleX(-1)";
            forwardControlBarButton.ariaLabel = "Forward 10 Seconds";

            rewindControlBarButton.parentNode.insertBefore(
                forwardControlBarButton,
                rewindControlBarButton.nextElementSibling
            );

            [forwardDisplayButton, forwardControlBarButton].forEach((button) => {

                button.onclick = () => {

                    const duration =
                        playerInstance.getDuration();

                    const position =
                        playerInstance.getPosition();

                    if (duration > 0 && duration !== Infinity) {
                        playerInstance.seek(position + 10);
                    }
                };
            });
        }
    }

    /* REMOVE ORIGINAL SETTINGS IF BROKEN */
    const settingsButton =
        playerContainer.querySelector(".jw-icon-settings");

    if (settingsButton) {
        settingsButton.style.display = "none";
    }

    /* ADD FAKE QUALITY BUTTON */
    const fakeQuality =
        document.createElement("div");

    fakeQuality.className = "fake-quality-btn";
    fakeQuality.innerText = "1080p";

    buttonContainer.appendChild(fakeQuality);

});

/* FULLSCREEN MOBILE FIX */
document.addEventListener("fullscreenchange", () => {

    const vid = document.querySelector("video");

    if (vid) {
        vid.style.objectFit = "contain";
    }
});
</script>

</body>
</html>
