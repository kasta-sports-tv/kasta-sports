<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    background: #000;
    overflow: hidden;
}

/* =========================
   JW STYLE WRAPPER (16:9 CONTAINER)
========================= */
#player-wrapper {
    position: relative;
    width: 100%;
    margin: 0;
    padding: 0;
    aspect-ratio: 16 / 9;
    background: #000;
    overflow: hidden;
}

/* fallback */
@supports not (aspect-ratio: 16 / 9) {
    #player-wrapper {
        height: calc(100vw * 9 / 16);
    }
}

/* =========================
   PLAYER AREA
========================= */
#player {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    background: #000;
}

/* VK PLAYER FIX */
#player iframe,
#player video {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
    background: #000 !important;
}
</style>
</head>

<body>

<div id="player-wrapper">
    <div id="player"></div>
</div>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

<script>
const params = new URLSearchParams(window.location.search);

const streamUrl =
    params.get("url") ||
    "https://live-nstu.cdn-03.cosmonova.net.ua/mobile-app/main/Olympic-Cam1/master.m3u8?key=YcCUSSFsx0Q3YMgtd20X";

new Playerjs({
    id: "player",
    file: decodeURIComponent(streamUrl),
    poster: "https://terrikon.com/i/0/1200/logos/tourns/fifa_world_cup2026.jpg",
    autoplay: 0,
    lang: "en"
});
</script>

</body>
</html>
