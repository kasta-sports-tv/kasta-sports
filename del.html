<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>2x1 Мультиплеєр</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      overflow: hidden;
    }

    /* Головний контейнер плеєра (завжди тримає 16:9) */
    .mega-player {
      position: relative;
      width: 100vw;
      max-width: 100%;
      aspect-ratio: 16 / 9;
      background: #111;
      overflow: hidden;
    }

    /* РЕЖИМ 1: Розділений екран 50/50 (Початковий) */
    .mega-player.split-mode {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      gap: 4px;
      padding: 4px;
    }

    /* РЕЖИМ 2: Картинка в картинці (PiP) */
    .mega-player.pip-mode {
      display: block;
    }

    /* Окремий бокс для кожного плеєра */
    .player-box {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    /* Поведінка боксів у режимі PiP */
    .mega-player.pip-mode .player-box.main-player {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .mega-player.pip-mode .player-box.pip-player {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 25%; /* Малий плеєр займає 25% від ширини екрану */
      aspect-ratio: 16 / 9;
      height: auto;
      z-index: 10;
      box-shadow: 0 0 15px rgba(0,0,0,0.7);
      border: 2px solid rgba(255, 255, 255, 0.4);
      cursor: pointer;
    }
    
    .mega-player.pip-mode .player-box.pip-player:hover {
      border-color: #fff;
    }

    /* Контейнер куди Clappr вбудовує відео */
    .inner-player {
      width: 100%;
      height: 100%;
      flex-grow: 1;
    }

    /* Водяний знак / Назва */
    .watermark {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: white;
      font-size: 0.9rem;
      text-shadow: 0 0 4px black;
      background: rgba(0, 0, 0, 0.5);
      padding: 2px 8px;
      border-radius: 4px;
      pointer-events: none; /* Щоб не заважало клікам */
      z-index: 5;
    }

    /* Панель керування зверху */
    .controls-panel {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 100;
      display: flex;
      gap: 10px;
    }

    .btn {
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .btn:hover {
      background: rgba(0, 0, 0, 0.9);
      border-color: #fff;
    }

    /* Стилі для Clappr, щоб відео розтягувалось коректно */
    .clappr-player {
      background: transparent !important;
    }
    video {
      object-fit: cover !important;
    }
  </style>
</head>
<body>

  <div class="mega-player split-mode" id="megaPlayer">
    
    <div class="controls-panel">
      <button class="btn" id="modeBtn">Режим: PiP</button>
      <button class="btn" id="fullscreenBtn">Повний екран</button>
    </div>
    
    <div class="player-box main-player" id="box1" data-index="0">
      <div class="inner-player" id="player1"></div>
      <div class="watermark">Трансляція 1</div>
    </div>
    
    <div class="player-box pip-player" id="box2" data-index="1">
      <div class="inner-player" id="player2"></div>
      <div class="watermark">Трансляція 2</div>
    </div>

  </div>

  <script>
    const streams = [
      "https://ext.cdn.nashnet.tv/228.0.2.45/index.m3u8",
      "https://ext.cdn.nashnet.tv/228.0.0.41/index.m3u8"
    ];

    const players = [];
    const megaPlayer = document.getElementById("megaPlayer");
    const modeBtn = document.getElementById("modeBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    
    const box1 = document.getElementById("box1");
    const box2 = document.getElementById("box2");

    // Ініціалізація Clappr плеєрів
    function initPlayers() {
      streams.forEach((src, index) => {
        const id = `#player${index + 1}`;
        players[index] = new Clappr.Player({
          source: src,
          parentId: id,
          autoPlay: true,
          mute: index !== 0, // Перший зі звуком, другий без звуку за замовчуванням
          width: '100%',
          height: '100%',
          fullscreenEnabled: false, // вимикаємо рідну кнопку Clappr
          chromeless: true // приховуємо рідні контроли для чистоти інтерфейсу
        });
      });
    }

    // Перемикання звуку (активний плеєр зі звуком, інший — muted)
    function updateMuteState() {
      if (megaPlayer.classList.contains('split-mode')) {
        // У режимі 50/50 зазвичай увімкнені обидва або перший. Зробимо перший активним.
        players[0].setMute(false);
        players[1].setMute(false);
      } else {
        // У режимі PiP звучить тільки той, що великий (main-player)
        if (box1.classList.contains('main-player')) {
          players[0].setMute(false);
          players[1].setMute(true);
        } else {
          players[0].setMute(true);
          players[1].setMute(false);
        }
      }
    }

    // Зміна режимів екрану (Розкидані 50/50 <-> Мультиплеєр PiP)
    function toggleMode() {
      if (megaPlayer.classList.contains('split-mode')) {
        megaPlayer.classList.remove('split-mode');
        megaPlayer.classList.add('pip-mode');
        modeBtn.textContent = "Режим: 50 / 50";
      } else {
        megaPlayer.classList.remove('pip-mode');
        megaPlayer.classList.add('split-mode');
        // Повертаємо дефолтні класи
        box1.className = "player-box main-player";
        box2.className = "player-box pip-player";
        modeBtn.textContent = "Режим: PiP";
      }
      updateMuteState();
    }

    // Логіка Свапу (Обміну місцями) при кліку на малий плеєр
    function handlePipClick(e) {
      // Клік працює тільки якщо ми в режимі PiP
      if (!megaPlayer.classList.contains('pip-mode')) return;
      
      const clickedBox = e.currentTarget;
      
      // Якщо клацнули на той, що вже великий — нічого не робимо
      if (clickedBox.classList.contains('main-player')) return;

      // Міняємо класи місцями
      if (box1.classList.contains('main-player')) {
        box1.className = "player-box pip-player";
        box2.className = "player-box main-player";
      } else {
        box1.className = "player-box main-player";
        box2.className = "player-box pip-player";
      }

      // Оновлюємо звук відповідно до нових позицій
      updateMuteState();
    }

    // Слухачі подій на кліки по плеєрах
    box1.addEventListener('click', handlePipClick);
    box2.addEventListener('click', handlePipClick);
    modeBtn.addEventListener('click', toggleMode);

    // Повноекранний режим браузера
    fullscreenBtn.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        if (megaPlayer.requestFullscreen) megaPlayer.requestFullscreen();
        // Якщо до кліку був режим 50/50, автоматично робимо PiP (як ти й просив)
        if (megaPlayer.classList.contains('split-mode')) {
          toggleMode();
        }
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
      }
    });

    document.addEventListener('fullscreenchange', () => {
      const isFs = !!document.fullscreenElement;
      fullscreenBtn.textContent = isFs ? 'Вийти з повного' : 'Повний екран';
    });

    // Запуск
    initPlayers();
    // Початкове налаштування звуку
    setTimeout(updateMuteState, 1000); 
  </script>
</body>
</html>
