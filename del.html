<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>AX SPORTS LIVE</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f1720;
    font-family:Arial,sans-serif;
    color:white;
    overflow:hidden;
}

/* HEADER */

.header{
    width:100%;
    height:70px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:#18222d;

    border-bottom:1px solid #2e3a49;

    font-size:24px;
    font-weight:bold;
    letter-spacing:1px;
}

/* MAIN */

.main{
    display:flex;
    width:100%;
    height:calc(100vh - 70px);
}

/* SIDEBAR */

.sidebar{
    width:360px;
    background:#141c24;
    overflow-y:auto;
    border-right:1px solid #2e3a49;
}

/* GROUP */

.group{
    padding:18px 14px 8px;

    color:#9eb1c7;

    font-size:14px;
    font-weight:bold;

    text-transform:uppercase;
    letter-spacing:1px;
}

/* MATCH */

.match{
    display:flex;
    align-items:center;
    gap:12px;

    margin:8px 10px;
    padding:12px;

    background:#1c2733;

    border:1px solid #2d3a4a;
    border-radius:14px;

    cursor:pointer;

    transition:.2s;
}

.match:hover{
    background:#243242;
    transform:scale(1.01);
}

.match.active{
    border-color:#4ea3ff;
    background:#243446;
}

/* LOGO */

.match img{
    width:42px;
    height:42px;

    object-fit:contain;

    background:#111;

    border-radius:8px;

    flex-shrink:0;
}

/* INFO */

.match-info{
    overflow:hidden;
}

.match-title{
    font-size:14px;
    font-weight:bold;
    line-height:1.4;

    word-break:break-word;
}

/* LIVE */

.live{
    display:inline-block;

    margin-top:5px;
    padding:3px 8px;

    background:#ff2d2d;

    border-radius:20px;

    font-size:11px;
    font-weight:bold;
}

/* PLAYER AREA */

.player-area{
    flex:1;
    position:relative;
    background:black;
}

/* IFRAME */

#player{
    width:100%;
    height:100%;
    border:none;
    background:black;
}

/* EMPTY */

.empty{
    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    color:#777;

    font-size:22px;
    text-align:center;

    z-index:2;
}

/* SCROLLBAR */

.sidebar::-webkit-scrollbar{
    width:8px;
}

.sidebar::-webkit-scrollbar-track{
    background:#141c24;
}

.sidebar::-webkit-scrollbar-thumb{
    background:#2e3a49;
    border-radius:10px;
}

/* MOBILE */

@media(max-width:900px){

    body{
        overflow:auto;
    }

    .main{
        flex-direction:column;
        height:auto;
    }

    .sidebar{
        width:100%;
        height:45vh;

        border-right:none;
        border-bottom:1px solid #2e3a49;
    }

    .player-area{
        width:100%;
        height:55vh;
    }

}

</style>

</head>

<body>

<div class="header">
    AX SPORTS LIVE
</div>

<div class="main">

    <div class="sidebar"
    id="sidebar"></div>

    <div class="player-area">

        <div class="empty"
        id="empty">
            Select Match
        </div>

        <iframe
            id="player"
            allowfullscreen
            frameborder="0"
            allow="autoplay; fullscreen">
        </iframe>

    </div>

</div>

<script>

const PLAYLIST_URL =
"https://raw.githubusercontent.com/srhady/axsports/main/playlist.m3u";

const PLAYER_URL =
"https://kasta-sports.vercel.app/videojs.html?url=";

const sidebar =
document.getElementById("sidebar");

const empty =
document.getElementById("empty");

/* LOAD PLAYLIST */

async function loadPlaylist(){

    try{

        sidebar.innerHTML = "";

        const response = await fetch(
            PLAYLIST_URL + "?t=" + Date.now()
        );

        const text =
            await response.text();

        const lines =
            text.split("\n");

        const groups = {};

        for(let i=0;i<lines.length;i++){

            const line = lines[i];

            if(line.startsWith("#EXTINF")){

                const title =
                    line.split(",").pop().trim();

                const stream =
                    lines[i + 1]?.trim();

                const logoMatch =
                    line.match(/tvg-logo="(.*?)"/);

                const groupMatch =
                    line.match(/group-title="(.*?)"/);

                const logo =
                    logoMatch
                    ? logoMatch[1]
                    : "";

                const group =
                    groupMatch
                    ? groupMatch[1]
                    : "Other";

                if(
                    stream &&
                    stream.startsWith("http")
                ){

                    if(!groups[group]){
                        groups[group] = [];
                    }

                    groups[group].push({
                        title,
                        stream,
                        logo
                    });

                }

            }

        }

        Object.keys(groups).forEach(groupName => {

            const groupDiv =
                document.createElement("div");

            groupDiv.className = "group";

            groupDiv.innerText =
                groupName;

            sidebar.appendChild(groupDiv);

            groups[groupName].forEach(match => {

                const item =
                    document.createElement("div");

                item.className = "match";

                item.innerHTML = `

                    <img
                    src="${match.logo}"
                    onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/3/3b/Logo_Sport.svg'">

                    <div class="match-info">

                        <div class="match-title">
                            ${match.title}
                        </div>

                        <div class="live">
                            LIVE
                        </div>

                    </div>

                `;

                item.onclick = () => {

                    document
                    .querySelectorAll(".match")
                    .forEach(el =>
                        el.classList.remove("active")
                    );

                    item.classList.add("active");

                    playStream(match.stream);

                };

                sidebar.appendChild(item);

            });

        });

    }catch(err){

        console.error(err);

        sidebar.innerHTML = `
            <div style="
                padding:20px;
                color:red;
                font-size:15px;
            ">
                Playlist Load Error
            </div>
        `;

    }

}

/* PLAY STREAM */

function playStream(url){

    empty.style.display = "none";

    const player =
        document.getElementById("player");

    player.src =
        PLAYER_URL +
        encodeURIComponent(url);

}

/* FIRST LOAD */

loadPlaylist();

/* AUTO REFRESH PLAYLIST */

setInterval(() => {

    loadPlaylist();

}, 60000);

</script>

</body>
</html>
