<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="google-site-verification" content="-SWuspthxR-vXpOxIoqwNKlsa9nYdTpoo6OfBlKECr4" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasta Sports</title>

  <style>
    body {
      background: #0e1118;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: white;
      overflow-x: hidden;
      height: 100vh;
      overflow-y: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 68px;
      background: rgba(8, 10, 15, 0.98);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #222838;
      display: flex;
      align-items: center;
      padding: 0 15px;
      z-index: 1000;
    }

    .header-content {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 28px;
      font-weight: 900;
      white-space: nowrap;
    }

    .logo .kasta { color: #ffffff; }
    .logo .sports { color: #ff1a1a; }

    .match-info {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: nowrap;
      white-space: nowrap;
      overflow: hidden;
      max-width: 100%;
      width: 100%;
      font-weight: bold;
    }

    .match-info.active {
      display: flex;
    }

    .match-info span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: clamp(10px, 3.5vw, 22px);
      max-width: 28%;
    }

    .match-info img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .layout {
      display: flex;
      height: calc(100dvh - 68px);
      margin-top: 68px;
      overflow: hidden;
    }

    .sidebar {
      width: 28%;
      min-width: 180px;
      background: #1a1e2a;
      padding: 10px;
      overflow-y: auto;
    }

    .tournament-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 12px 0 6px;
    }

    .tournament-header img {
      width: 42px;
      height: 42px;
      border-radius: 6px;
      object-fit: contain;
    }

    .tournament-name {
      color: #bfc7d5;
      font-weight: 800;
      font-size: 18px;
    }

    .stream-btn {
      width: 100%;
      background-color: #1a1e2a;
      color: white;
      border: 1px solid #2b3244;
      padding: 12px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: 0.25s;
    }

    .stream-btn:hover {
      background-color: #222838;
      transform: scale(1.03);
      border-color: #3a425a;
    }

    .stream-btn.active {
      background-color: #2a3142;
      border-color: #4a556f;
      box-shadow: 0 0 10px rgba(0,0,0,0.6);
    }

    .team {
      display: flex;
      align-items: center;
      gap: 7px;
      justify-content: center;
      flex: 1;
      text-align: center;
    }

    .team img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .match-time {
      width: 55px;
      text-align: center;
      font-weight: bold;
      flex-shrink: 0;
    }

    .player-section {
      width: 72%;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .player-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: black;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 12px 35px rgba(0,0,0,0.75);
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }

    /* 🔥 SLIDER */
    .slider {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: fill;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .slide.active {
      opacity: 1;
    }

    .select-text {
      margin-top: 12px;
      text-align: center;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      body {
        height: 100dvh;
        overflow-y: hidden;
      }

      .layout {
        flex-direction: column;
        height: calc(100dvh - 68px);
      }

      .sidebar {
        width: 95%;
        order: 2;
      }

      .player-section {
        width: 95%;
        order: 1;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="header-content">
    <div class="logo">
      <span class="kasta">Kasta</span>
      <span class="sports">Sports</span>
    </div>
  </div>
</header>

<div class="layout">

  <div class="sidebar">

    <div class="tournament-header">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/bf/WTA_logo_2010.svg/330px-WTA_logo_2010.svg.png">
      <div class="tournament-name">Теніс</div>
    </div>

    <button class="stream-btn"
      onclick="setStream('https://sportkastv.blogspot.com/2026/06/2-vs.html', this,
      'https://static.flashscore.com/res/image/data/t0KLGnhl-AgeKOBAK.png',
      'Удверді','16:30*','Снігур',
      'https://static.flashscore.com/res/image/data/zcffm2HG-QHPiesek.png')">

      <div class="team">
        <img src="https://static.flashscore.com/res/image/data/t0KLGnhl-AgeKOBAK.png">
        <span>Удверді</span>
      </div>

      <span class="match-time">16:30*</span>

      <div class="team">
        <span>Снігур</span>
        <img src="https://static.flashscore.com/res/image/data/zcffm2HG-QHPiesek.png">
      </div>
      
    </button>

    <div class="tournament-header">
      <img src="https://static.flashscore.com/res/image/data/zHA4l5CO-tM7IMMQC.png">
      <div class="tournament-name">Волейбол</div>
    </div>

    <button class="stream-btn"
      onclick="setStream('https://sportkastv.blogspot.com/2026/06/html-body-margin-0-padding-0-width-100_0753842376.html', this,
      'https://static.flashscore.com/res/image/data/va0cEUGG-8KJ0tcMR.png',
      'Україна','11:30','Китай',
      'https://static.flashscore.com/res/image/data/nc9uS3HG-QDuM2WrS.png')">

      <div class="team">
        <img src="https://static.flashscore.com/res/image/data/va0cEUGG-8KJ0tcMR.png">
        <span>Україна</span>
      </div>

      <span class="match-time">11:30</span>

      <div class="team">
        <span>Китай</span>
        <img src="https://static.flashscore.com/res/image/data/nc9uS3HG-QDuM2WrS.png">
      </div>
      
    </button>
    
  </div>

  <div class="player-section">

    <div class="player-container">

      <!-- 🔥 СЛАЙДЕР -->
      <div class="slider" id="slider">
        <img src="https://cdn-ksvod.kyivstar.ua/content/HLS/VOD/IMAGE6/6a0d99578a1474a373b68870/IMAGE_16_9_L.jpg" class="slide active">
        <img src="https://s2.vcdn.biz/static/f/11910373651/targetslide-ua.jpg/pt/r410x230x4" class="slide">
        <img src="https://s9.vcdn.biz/static/f/11910666041/targetslide-ua.jpg/pt/r410x230x4" class="slide">
        <img src="https://s7.vcdn.biz/static/f/11905256571/targetslide-ua.jpg/pt/r410x230x4" class="slide">
      </div>

      <iframe id="mainPlayer"
        sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
        allowfullscreen></iframe>

    </div>

    <div class="select-text" id="selectText">Оберіть трансляцію</div>

    <div class="match-info" id="matchInfo">
      <img id="team1Img">
      <span id="team1Name"></span>
      <span id="matchTime"></span>
      <span id="team2Name"></span>
      <img id="team2Img">
    </div>

  </div>
</div>

<script>
function setStream(url, btn, img1, t1, time, t2, img2) {
  const iframe = document.getElementById('mainPlayer');
  const matchInfo = document.getElementById('matchInfo');
  const selectText = document.getElementById('selectText');

  document.querySelectorAll('.stream-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  iframe.src = url;
  selectText.style.display = 'none';

  document.getElementById('slider').style.display = 'none';

  document.getElementById('team1Img').src = img1;
  document.getElementById('team2Img').src = img2;
  document.getElementById('team1Name').innerText = t1;
  document.getElementById('team2Name').innerText = t2;
  document.getElementById('matchTime').innerText = time;

  matchInfo.classList.add('active');
}

/* SLIDER */
let slides = document.querySelectorAll('.slide');
let current = 0;

setInterval(() => {
  slides[current].classList.remove('active');
  current = (current + 1) % slides.length;
  slides[current].classList.add('active');
}, 4000);

/* FULLSCREEN */
document.addEventListener('fullscreenchange', async () => {
  if (document.fullscreenElement) {
    try { await screen.orientation.lock('landscape'); } catch(e) {}
  } else {
    try { await screen.orientation.unlock(); } catch(e) {}
  }
});
</script>

</body>
</html>
