<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="referrer" content="no-referrer">

<title>Kasta Sports</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   ONLY COLOR ADJUSTMENT
   (NO LAYOUT CHANGES)
========================= */

:root{
    --yellow:#caa24a;
    --bg:#050607;
    --panel:#0b0e13;
    --border:#1a2230;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:var(--bg);
    color:#e6e6e6;
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* HEADER */

header{
    flex-shrink:0;
    padding:12px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid var(--border);
    background:#0a0d12;
    z-index:100;
}

.logo{
    font-family:'Rajdhani',sans-serif;
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
    color:var(--yellow);
    text-shadow:0 0 12px rgba(202,162,74,0.15);
}

/* SEARCH */

.search{
    background:#0e121a;
    border:1px solid var(--border);
    color:#e6e6e6;
    padding:9px 14px;
    width:180px;
    font-size:14px;
    outline:none;
    border-radius:10px;
    transition:0.3s;
    font-weight:600;
}

.search::placeholder{
    color:#8a93a6;
}

.search:focus{
    box-shadow:0 0 10px rgba(202,162,74,0.2);
    border-color:var(--yellow);
}

/* CONTAINER */

.container{
    flex:1;
    display:grid;
    grid-template-columns:3fr 1.2fr;
    gap:15px;
    padding:15px;
    overflow:hidden;
    max-width:1600px;
    margin:0 auto;
    width:100%;
}

/* PLAYER */

.player-wrap{
    display:flex;
    flex-direction:column;
    border:1px solid var(--border);
    background:#000;
    overflow:hidden;
    height:100%;
    border-radius:18px;
}

/* PLAYER AREA */

#iframePlayer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    background:#000;
}

/* INFO BAR */

.info-bar{
    padding:12px;
    background:#0e121a;
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.ch-info h2{
    font-family:'Rajdhani',sans-serif;
    font-size:18px;
    margin:0;
    color:#f1f1f1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.live-badge{
    background:#a83232;
    color:#fff;
    padding:3px 7px;
    font-size:11px;
    border-radius:4px;
    animation:blink 1s infinite;
    margin-right:5px;
    font-weight:700;
}

#watermark{
    font-family:'Rajdhani',sans-serif;
    border:1px solid var(--yellow);
    padding:5px 10px;
    font-size:13px;
    color:var(--yellow);
    border-radius:8px;
}

/* LIST */

.list-wrap{
    display:flex;
    flex-direction:column;
    border:1px solid var(--border);
    background:var(--panel);
    overflow:hidden;
    height:100%;
    border-radius:18px;
}

.marquee{
    background:#0a0d12;
    color:#9aa3b2;
    padding:8px;
    font-size:13px;
    border-bottom:1px solid var(--border);
}

/* CATEGORY */

.cat-bar{
    background:#090c11;
    padding:10px;
    overflow-x:auto;
    white-space:nowrap;
    border-bottom:1px solid var(--border);
}

.cat-btn{
    background:#111827;
    color:#9aa3b2;
    border:1px solid var(--border);
    padding:8px 14px;
    margin-right:5px;
    border-radius:8px;
}

.cat-btn:hover{
    color:#ffffff;
}

.cat-btn.active{
    background:var(--yellow);
    color:#000;
}

/* ITEMS */

.item{
    display:flex;
    align-items:center;
    padding:13px 10px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
}

.item:hover{
    background:rgba(202,162,74,0.08);
}

.item.active{
    background:rgba(202,162,74,0.15);
    border-left:4px solid var(--yellow);
}

.c-icon{
    width:48px;
    height:48px;
    background:#fff;
    margin-right:12px;
    object-fit:contain;
    border-radius:10px;
    border:1px solid #2a2f3a;
}

/* TEXT */

.c-name{
    font-weight:700;
    font-size:15px;
    color:#f2d7a0;
}

.c-cat{
    font-size:12px;
    color:#8a93a6;
}

/* FOOTER */

footer{
    flex-shrink:0;
    background:#0a0d12;
    border-top:1px solid var(--border);
    padding:6px 12px;
    font-size:12px;
    color:#8a93a6;
}

/* MOBILE */

@media(max-width:900px){
    body{
        height:100vh;
        display:flex;
        flex-direction:column;
        overflow:hidden;
    }
}

::-webkit-scrollbar{
    width:4px;
    background:#0a0a0a;
}

::-webkit-scrollbar-thumb{
    background:var(--yellow);
}

@keyframes blink{
    50%{opacity:0.5;}
}

</style>

</head>

<body oncontextmenu="return false;">

<header>
    <div class="logo" onclick="location.reload()">Kasta Sports</div>
    <div class="search-wrap">
        <input type="text" class="search" placeholder="SEARCH..." onkeyup="search(this.value)">
    </div>
</header>

<div class="container">

<div class="player-wrap" id="playerTarget">

<div class="video-container">
<div class="aspect-ratio">
<iframe id="iframePlayer"
allowfullscreen
allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
referrerpolicy="no-referrer"></iframe>
</div>
</div>

<div class="info-bar">
<div class="ch-info">
<h2><span class="live-badge">LIVE</span><span id="chName">SELECT CHANNEL</span></h2>
</div>
<div id="watermark">Kasta Sports</div>
</div>

</div>

<div class="list-wrap">

<marquee class="marquee" id="noticeText" scrollamount="4">
WELCOME TO Kasta Sports - SYSTEM ONLINE
</marquee>

<div class="cat-bar" id="catMenu"></div>
<div class="list-items" id="chList"></div>

</div>

</div>

<footer>
<span>VISITORS: 6184</span>
<span>STATUS: <span style="color:var(--yellow)">ONLINE</span></span>
</footer>

<script>

/* JS NOT TOUCHED */
const PLAYLIST_URL="https://raw.githubusercontent.com/srhady/axsports/main/playlist.m3u";
const PLAYER_URL="https://sportkastv.blogspot.com/2026/05/netflix-skin.html?url=";

let db={channels:[]};
let currentCategory="All";
let currentSearch="";
let currentPlaying="";

function init(){
document.getElementById('noticeText').innerText="WELCOME TO Kasta Sports - LIVE SPORTS SYSTEM";
loadPlaylist();
setInterval(()=>loadPlaylist(true),60000);
}

async function loadPlaylist(silent=false){
try{
const response=await fetch(PLAYLIST_URL+"?t="+Date.now());
const text=await response.text();
const lines=text.split('\n');
let channels=[];
let counts={};

for(let i=0;i<lines.length;i++){
const line=lines[i];
if(line.startsWith('#EXTINF')){
const url=lines[i+1]?.trim();
if(!url||!url.startsWith('http')) continue;

const title=line.split(',').pop().trim();
const logoMatch=line.match(/tvg-logo="(.*?)"/);
const groupMatch=line.match(/group-title="(.*?)"/);

channels.push({
name:title,
group:groupMatch?groupMatch[1]:"Other",
logo:logoMatch?logoMatch[1]:"",
url:PLAYER_URL+encodeURIComponent(url),
icon:title.substring(0,2).toUpperCase()
});
}
}

db.channels=channels;
render(channels);

}catch(e){console.error(e);}
}

function render(list){
const el=document.getElementById('chList');
el.innerHTML="";
list.forEach(c=>{
const div=document.createElement("div");
div.className="item";
div.innerHTML=`
<img src="${c.logo}" class="c-icon">
<div onclick="play('${c.url}','${c.name}')">
<div class="c-name">${c.name}</div>
<div class="c-cat">${c.group}</div>
</div>`;
el.appendChild(div);
});
}

function play(url,name){
document.getElementById('iframePlayer').src=url;
document.getElementById('chName').innerText=name;
}

function search(t){
render(db.channels.filter(c=>c.name.toLowerCase().includes(t.toLowerCase())));
}

init();

</script>

</body>
</html>
