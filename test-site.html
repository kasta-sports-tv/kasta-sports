<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="referrer" content="no-referrer">

<title>Kasta Sports</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0b0f14;
    --accent:#7aa2ff;
    --panel:#111827;
    --border:#243244;
    --text:#e6edf3;
    --muted:#9aa4b2;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:var(--bg);
    color:var(--text);
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* HEADER */

header{
    flex-shrink:0;
    padding:12px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid var(--border);
    background:#0f141b;
    z-index:100;
}

.logo{
    font-family:'Rajdhani',sans-serif;
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
    color:var(--text);
    cursor:pointer;
    text-shadow:0 0 10px rgba(122,162,255,0.25);
}

.search{
    background:#0f1722;
    border:1px solid var(--border);
    color:var(--text);
    padding:9px 14px;
    width:180px;
    font-size:14px;
    outline:none;
    border-radius:10px;
    transition:0.3s;
    font-weight:600;
}

.search:focus{
    box-shadow:0 0 10px rgba(122,162,255,0.35);
    width:220px;
}

/* CONTAINER */

.container{
    flex:1;
    display:grid;
    grid-template-columns:3fr 1.2fr;
    gap:15px;
    padding:15px;
    overflow:hidden;
    max-width:1600px;
    margin:0 auto;
    width:100%;
}

/* PLAYER */

.player-wrap{
    display:flex;
    flex-direction:column;
    border:1px solid var(--border);
    background:#000;
    overflow:hidden;
    height:100%;
    border-radius:18px;
}

/* VIDEO */

.video-container{
    position:relative;
    width:100%;
    background:#000;
    flex-shrink:0;
}

.aspect-ratio{
    padding-top:56.25%;
    position:relative;
}

#iframePlayer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    background:#000;
}

/* INFO */

.info-bar{
    padding:12px;
    background:#0f141b;
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.ch-info h2{
    font-family:'Rajdhani',sans-serif;
    font-size:18px;
    margin:0;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.live-badge{
    background:#e63946;
    color:#fff;
    padding:3px 7px;
    font-size:11px;
    border-radius:4px;
    animation:blink 1s infinite;
    margin-right:5px;
    font-weight:700;
}

#watermark{
    font-family:'Rajdhani',sans-serif;
    border:1px solid var(--border);
    padding:5px 10px;
    font-size:13px;
    color:var(--muted);
    border-radius:8px;
}

/* LIST */

.list-wrap{
    display:flex;
    flex-direction:column;
    border:1px solid var(--border);
    background:var(--panel);
    overflow:hidden;
    height:100%;
    border-radius:18px;
}

.marquee{
    background:#0f141b;
    color:var(--muted);
    padding:8px;
    font-size:13px;
    border-bottom:1px solid var(--border);
    white-space:nowrap;
    overflow:hidden;
    font-weight:600;
}

.cat-bar{
    background:#0c1118;
    padding:10px;
    overflow-x:auto;
    white-space:nowrap;
    border-bottom:1px solid var(--border);
    scrollbar-width:none;
    flex-shrink:0;
}

.cat-btn{
    background:#111827;
    color:var(--muted);
    border:1px solid var(--border);
    padding:8px 14px;
    margin-right:5px;
    cursor:pointer;
    font-size:13px;
    border-radius:8px;
    transition:0.2s;
    font-weight:700;
}

.cat-btn:hover{
    background:#1b2430;
    color:#fff;
}

.cat-btn.active{
    background:var(--accent);
    color:#0b0f14;
    border-color:var(--accent);
}

/* ITEMS */

.item{
    display:flex;
    align-items:center;
    padding:13px 10px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    transition:0.2s;
}

.item:hover{
    background:rgba(122,162,255,0.08);
}

.item.active{
    background:rgba(122,162,255,0.15);
    border-left:4px solid var(--accent);
}

.c-icon{
    width:48px;
    height:48px;
    background:#fff;
    margin-right:12px;
    object-fit:contain;
    border-radius:10px;
    border:1px solid var(--border);
    flex-shrink:0;
    padding:4px;
}

.c-txt-icon{
    width:48px;
    height:48px;
    background:#111827;
    color:var(--accent);
    border:1px solid var(--border);
    display:grid;
    place-items:center;
    margin-right:12px;
    font-weight:bold;
    border-radius:10px;
}

.c-name{
    font-weight:700;
    font-size:15px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:var(--text);
}

.c-cat{
    font-size:12px;
    color:var(--muted);
    margin-top:3px;
}

/* FOOTER */

footer{
    flex-shrink:0;
    background:#0f141b;
    border-top:1px solid var(--border);
    padding:6px 12px;
    font-size:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:var(--muted);
    font-weight:600;
}

/* MOBILE */

@media(max-width:900px){

.container{
    display:flex;
    flex-direction:column;
    padding:0;
}

.player-wrap{
    border:none;
    border-bottom:2px solid var(--border);
    border-radius:0;
}

.list-wrap{
    border:none;
    border-radius:0;
}

}

::-webkit-scrollbar{
    width:4px;
    background:#0b0f14;
}

::-webkit-scrollbar-thumb{
    background:#2a3441;
}

@keyframes blink{
    50%{opacity:0.5;}
}

</style>
</head>

<body oncontextmenu="return false;">

<header>

    <div class="logo" onclick="location.reload()">
        Kasta Sports
    </div>

    <div class="search-wrap">
        <input type="text" class="search" placeholder="SEARCH..." onkeyup="search(this.value)">
    </div>

</header>

<div class="container">

    <div class="player-wrap" id="playerTarget">

        <div class="video-container">
            <div class="aspect-ratio">
                <iframe id="iframePlayer"
                    allowfullscreen
                    allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
                    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                    referrerpolicy="no-referrer">
                </iframe>
            </div>
        </div>

        <div class="info-bar">

            <div class="ch-info">
                <h2>
                    <span class="live-badge">LIVE</span>
                    <span id="chName">SELECT CHANNEL</span>
                </h2>
            </div>

            <div id="watermark">Kasta Sports</div>

        </div>

    </div>

    <div class="list-wrap">

        <marquee class="marquee" id="noticeText">
            WELCOME TO Kasta Sports - SYSTEM ONLINE
        </marquee>

        <div class="cat-bar" id="catMenu"></div>

        <div class="list-items" id="chList"></div>

    </div>

</div>

<footer>
    <span>VISITORS: 6184</span>
    <span>STATUS: ONLINE</span>
</footer>

<script>

const PLAYLIST_URL =
"https://raw.githubusercontent.com/srhady/axsports/main/playlist.m3u";

const PLAYER_URL =
"https://sportkastv.blogspot.com/2026/05/netflix-skin.html?url=";

let db = {channels:[]};
let currentCategory="All";
let currentSearch="";
let currentPlaying="";

function init(){
    document.getElementById('noticeText').innerText =
    "WELCOME TO Kasta Sports - LIVE SPORTS SYSTEM";

    loadPlaylist();
    setInterval(()=>loadPlaylist(true),60000);
}

async function loadPlaylist(){
    try{
        const response = await fetch(PLAYLIST_URL+"?t="+Date.now());
        const text = await response.text();
        const lines = text.split('\n');

        let channels=[];
        let counts={};

        for(let i=0;i<lines.length;i++){
            if(lines[i].startsWith('#EXTINF')){
                const url=lines[i+1]?.trim();
                if(!url||!url.startsWith('http')) continue;

                const title=lines[i].split(',').pop().trim();
                const group=(lines[i].match(/group-title="(.*?)"/)||[])[1]||"Other";
                const logo=(lines[i].match(/tvg-logo="(.*?)"/)||[])[1]||"";

                channels.push({
                    name:title,
                    group,
                    logo,
                    url:PLAYER_URL+encodeURIComponent(url),
                    icon:title.substring(0,2).toUpperCase()
                });
            }
        }

        db.channels=channels;
        buildCategories();
        applyFilters();

    }catch(e){console.error(e);}
}

function buildCategories(){
    const menu=document.getElementById('catMenu');
    let html=`<button class="cat-btn ${currentCategory==='All'?'active':''}" onclick="setCat('All')">ALL</button>`;

    [...new Set(db.channels.map(c=>c.group))].sort().forEach(c=>{
        html+=`<button class="cat-btn ${currentCategory===c?'active':''}" onclick="setCat('${c}')">${c}</button>`;
    });

    menu.innerHTML=html;
}

function applyFilters(){
    let filtered=db.channels;

    if(currentCategory!=='All')
        filtered=filtered.filter(c=>c.group===currentCategory);

    if(currentSearch)
        filtered=filtered.filter(c=>c.name.toLowerCase().includes(currentSearch.toLowerCase()));

    render(filtered);
}

function render(list){
    const el=document.getElementById('chList');
    let html="";

    if(!list.length){
        el.innerHTML="<p style='padding:20px;text-align:center'>NO CHANNELS</p>";
        return;
    }

    list.forEach(c=>{
        const active=currentPlaying===c.url?"active":"";
        const logo=c.logo?`<img src="${c.logo}" class="c-icon" onerror="this.style.display='none'">`:"";

        html+=`
        <div class="item ${active}">
            ${logo}
            <div class="c-meta" onclick="playChannel('${c.url}','${c.name.replace(/'/g,"\\'")}',this)">
                <div class="c-name">${c.name}</div>
                <div class="c-cat">${c.group}</div>
            </div>
        </div>`;
    });

    el.innerHTML=html;
}

function playChannel(url,name,el){
    currentPlaying=url;
    document.getElementById('chName').innerText=name;
    document.getElementById('iframePlayer').src=url;

    document.querySelectorAll('.item').forEach(i=>i.classList.remove('active'));
    if(el) el.parentElement.classList.add('active');
}

function setCat(cat){currentCategory=cat;buildCategories();applyFilters();}
function search(t){currentSearch=t;applyFilters();}

init();

</script>

</body>
</html>
