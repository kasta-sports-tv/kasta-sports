<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="referrer" content="no-referrer">

<title>Kasta Sports</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<style>

/* =======================
   PREMIUM DARK THEME ONLY
   (no layout changes)
======================= */

:root{
    --yellow:#c8a46a;
    --bg:#07080b;
    --panel:#0e1117;
    --border:#1c2230;
    --text:#e6e6e6;
    --muted:#8b93a6;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:radial-gradient(circle at top,#0d111a,#07080b);
    color:var(--text);
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* HEADER */

header{
    flex-shrink:0;
    padding:12px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid var(--border);
    background:rgba(10,12,18,0.92);
    backdrop-filter:blur(12px);
}

.logo{
    font-family:'Rajdhani',sans-serif;
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
    color:var(--yellow);
    text-shadow:0 0 18px rgba(200,164,106,0.18);
}

.search{
    background:#0f1420;
    border:1px solid var(--border);
    color:var(--text);
    padding:9px 14px;
    width:180px;
    font-size:14px;
    outline:none;
    border-radius:10px;
    transition:0.25s;
}

.search:focus{
    border-color:var(--yellow);
    box-shadow:0 0 12px rgba(200,164,106,0.18);
}

/* CONTAINER */

.container{
    flex:1;
    display:grid;
    grid-template-columns:3fr 1.2fr;
    gap:15px;
    padding:15px;
    overflow:hidden;
    max-width:1600px;
    margin:0 auto;
    width:100%;
}

/* PLAYER */

.player-wrap{
    display:flex;
    flex-direction:column;
    border:1px solid var(--border);
    background:#000;
    overflow:hidden;
    height:100%;
    border-radius:18px;
}

/* VIDEO */

#iframePlayer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    background:#000;
}

/* INFO BAR */

.info-bar{
    padding:12px;
    background:#0f1420;
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.ch-info h2{
    font-family:'Rajdhani',sans-serif;
    font-size:18px;
    margin:0;
    color:#fff;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.live-badge{
    background:#b3261e;
    color:#fff;
    padding:3px 7px;
    font-size:11px;
    border-radius:4px;
    animation:blink 1.2s infinite;
    margin-right:5px;
    font-weight:700;
}

#watermark{
    font-family:'Rajdhani',sans-serif;
    border:1px solid var(--yellow);
    padding:5px 10px;
    font-size:13px;
    opacity:0.9;
    color:var(--yellow);
    border-radius:8px;
}

/* LIST */

.list-wrap{
    display:flex;
    flex-direction:column;
    border:1px solid var(--border);
    background:var(--panel);
    overflow:hidden;
    height:100%;
    border-radius:18px;
}

.marquee{
    background:#0b0f18;
    color:var(--muted);
    padding:8px;
    font-size:13px;
    border-bottom:1px solid var(--border);
}

/* CATEGORIES */

.cat-bar{
    background:#0a0d14;
    padding:10px;
    overflow-x:auto;
    white-space:nowrap;
    border-bottom:1px solid var(--border);
}

.cat-btn{
    background:#111827;
    color:var(--muted);
    border:1px solid var(--border);
    padding:8px 14px;
    margin-right:5px;
    border-radius:8px;
    transition:0.2s;
}

.cat-btn:hover{
    color:#fff;
}

.cat-btn.active{
    background:var(--yellow);
    color:#000;
}

/* ITEMS */

.item{
    display:flex;
    align-items:center;
    padding:13px 10px;
    border-bottom:1px solid var(--border);
    cursor:pointer;
    transition:0.2s;
}

.item:hover{
    background:rgba(200,164,106,0.08);
}

.item.active{
    background:rgba(200,164,106,0.15);
    border-left:3px solid var(--yellow);
}

.c-icon{
    width:48px;
    height:48px;
    background:#fff;
    margin-right:12px;
    object-fit:contain;
    border-radius:10px;
}

/* TEXT */

.c-name{
    font-weight:700;
    font-size:15px;
    color:#f2d7a0;
}

.c-cat{
    font-size:12px;
    color:var(--muted);
}

/* FOOTER */

footer{
    padding:6px 12px;
    font-size:12px;
    background:#0a0d14;
    border-top:1px solid var(--border);
    color:var(--muted);
}

/* MOBILE */

@media(max-width:900px){
    .container{
        display:flex;
        flex-direction:column;
        padding:0;
        gap:0;
    }
}

::-webkit-scrollbar{
    width:4px;
    background:#0a0a0a;
}

::-webkit-scrollbar-thumb{
    background:var(--yellow);
}

@keyframes blink{
    50%{opacity:0.5;}
}

</style>

</head>

<body oncontextmenu="return false;">

<header>
    <div class="logo" onclick="location.reload()">Kasta Sports</div>
    <div><input class="search" onkeyup="search(this.value)" placeholder="SEARCH..."></div>
</header>

<div class="container">

<div class="player-wrap" id="playerTarget">

<iframe id="iframePlayer"
allowfullscreen
sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"></iframe>

<div class="info-bar">
<div class="ch-info">
<span class="live-badge">LIVE</span>
<span id="chName">SELECT CHANNEL</span>
</div>
<div id="watermark">Kasta Sports</div>
</div>

</div>

<div class="list-wrap">

<marquee class="marquee" id="noticeText">WELCOME</marquee>

<div class="cat-bar" id="catMenu"></div>
<div class="list-items" id="chList"></div>

</div>

</div>

<footer>
STATUS: ONLINE
</footer>

<script>

const PLAYLIST_URL =
"https://raw.githubusercontent.com/srhady/axsports/main/playlist.m3u";

const PLAYER_URL =
"https://sportkastv.blogspot.com/2026/05/netflix-skin.html?url=";

let db={channels:[]};
let currentCategory="All";
let currentSearch="";
let currentPlaying="";

/* ===== YOUR JS LEFT EXACTLY AS ORIGINAL ===== */

function init(){

loadPlaylist();
setInterval(()=>loadPlaylist(true),60000);

}

async function loadPlaylist(){

const res=await fetch(PLAYLIST_URL+"?t="+Date.now());
const text=await res.text();
const lines=text.split('\n');

let channels=[];
let counts={};

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith('#EXTINF')){

const url=lines[i+1]?.trim();
if(!url) continue;

const title=lines[i].split(',').pop().trim();
const groupMatch=lines[i].match(/group-title="(.*?)"/);
const logoMatch=lines[i].match(/tvg-logo="(.*?)"/);

channels.push({
name:title,
group:groupMatch?groupMatch[1]:"Other",
logo:logoMatch?logoMatch[1]:"",
url:PLAYER_URL+encodeURIComponent(url),
icon:title.substring(0,2)
});

}

}

db.channels=channels;
render(channels);

}

function render(list){

const el=document.getElementById('chList');
el.innerHTML="";

list.forEach(c=>{

const div=document.createElement("div");
div.className="item";

div.innerHTML=`
<img src="${c.logo}" class="c-icon">
<div onclick="play('${c.url}','${c.name}')">
<div class="c-name">${c.name}</div>
<div class="c-cat">${c.group}</div>
</div>
`;

el.appendChild(div);

});

}

function play(url,name){

document.getElementById('iframePlayer').src=url;
document.getElementById('chName').innerText=name;

}

function search(t){

render(db.channels.filter(c=>
c.name.toLowerCase().includes(t.toLowerCase())
));

}

init();

</script>

</body>
</html>
