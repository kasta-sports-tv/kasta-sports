<!DOCTYPE html>
<html lang="uk">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="referrer" content="no-referrer">

<title>Kasta Sports</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<style>

:root{
    --accent:#9aa4ff;
    --bg:#0b0c10;
    --panel:#111319;
    --panel2:#0f1117;
    --border:1px solid #222733;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:var(--bg);
    color:#e6e8ff;
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* HEADER */

header{
    flex-shrink:0;
    padding:12px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #1d2230;
    background:#0c0e14;
    z-index:100;
}

.logo{
    font-family:'Rajdhani',sans-serif;
    font-size:28px;
    font-weight:700;
    letter-spacing:1px;
    color:#e6e8ff;
    cursor:pointer;
    text-shadow:0 0 14px rgba(154,164,255,0.25);
}

.search-wrap{
    position:relative;
}

.search{
    background:#151826;
    border:1px solid #222733;
    color:#e6e8ff;
    padding:9px 14px;
    width:180px;
    font-size:14px;
    outline:none;
    border-radius:10px;
    transition:0.3s;
    font-weight:600;
}

.search::placeholder{
    color:#7a8096;
}

.search:focus{
    box-shadow:0 0 12px rgba(154,164,255,0.25);
    width:220px;
}

/* CONTAINER */

.container{
    flex:1;
    display:grid;
    grid-template-columns:3fr 1.2fr;
    gap:15px;
    padding:15px;
    overflow:hidden;
    max-width:1600px;
    margin:0 auto;
    width:100%;
}

/* PLAYER SECTION */

.player-wrap{
    display:flex;
    flex-direction:column;
    border:1px solid #222733;
    background:#000;
    overflow:hidden;
    height:100%;
    border-radius:18px;
}

.video-container{
    position:relative;
    width:100%;
    background:#000;
    flex-shrink:0;
}

.aspect-ratio{
    padding-top:56.25%;
    position:relative;
}

#iframePlayer{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border:none;
    background:#000;
}

.info-bar{
    padding:12px;
    background:#111319;
    border-top:1px solid #222733;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.ch-info h2{
    font-family:'Rajdhani',sans-serif;
    font-size:18px;
    margin:0;
    color:#e6e8ff;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.live-badge{
    background:#ff4444;
    color:#fff;
    padding:3px 7px;
    font-size:11px;
    border-radius:4px;
    animation:blink 1s infinite;
    margin-right:5px;
    vertical-align:middle;
    font-weight:700;
}

#watermark{
    font-family:'Rajdhani',sans-serif;
    border:1px solid #222733;
    padding:5px 10px;
    font-size:13px;
    opacity:0.9;
    color:#e6e8ff;
    border-radius:8px;
    font-weight:700;
}

/* LIST SECTION */

.list-wrap{
    display:flex;
    flex-direction:column;
    border:1px solid #222733;
    background:var(--panel);
    overflow:hidden;
    height:100%;
    border-radius:18px;
}

.marquee{
    background:#0c0e14;
    color:#cfd6ff;
    padding:8px;
    font-size:13px;
    border-bottom:1px solid #1d2230;
    white-space:nowrap;
    overflow:hidden;
    font-weight:600;
}

.cat-bar{
    background:#0c0e14;
    padding:10px;
    overflow-x:auto;
    white-space:nowrap;
    border-bottom:1px solid #1d2230;
    scrollbar-width:none;
    flex-shrink:0;
}

.cat-bar::-webkit-scrollbar{
    display:none;
}

.cat-btn{
    background:#121521;
    color:#cfd6ff;
    border:1px solid #222733;
    padding:8px 14px;
    margin-right:5px;
    cursor:pointer;
    font-size:13px;
    font-family:'Inter',sans-serif;
    border-radius:8px;
    transition:0.2s;
    font-weight:700;
}

.cat-btn:hover{
    background:#1a1f2e;
    color:#ffffff;
}

.cat-btn.active{
    color:#ffffff;
    background:#2a3350;
    font-weight:bold;
    border-color:#2a3350;
}

.list-items{
    overflow-y:auto;
    flex:1;
    padding:0;
}

.item{
    display:flex;
    align-items:center;
    padding:13px 10px;
    border-bottom:1px solid #1d2230;
    cursor:pointer;
    transition:0.2s;
}

.item:hover{
    background:rgba(154,164,255,0.08);
}

.item.active{
    background:rgba(154,164,255,0.15);
    border-left:4px solid var(--accent);
}

.c-icon{
    width:48px;
    height:48px;
    background:#fff;
    margin-right:12px;
    object-fit:contain;
    border-radius:10px;
    border:1px solid #222733;
    flex-shrink:0;
    padding:4px;
}

.c-txt-icon{
    width:48px;
    height:48px;
    background:#111319;
    color:#e6e8ff;
    border:1px solid #222733;
    display:grid;
    place-items:center;
    margin-right:12px;
    font-weight:bold;
    flex-shrink:0;
    border-radius:10px;
}

.c-meta{
    flex:1;
    overflow:hidden;
}

.c-name{
    font-weight:700;
    font-size:15px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    color:#e6e8ff;
}

.c-cat{
    font-size:12px;
    color:#7a8096;
    margin-top:3px;
}

/* FOOTER */

footer{
    flex-shrink:0;
    background:#0c0e14;
    border-top:1px solid #1d2230;
    padding:6px 12px;
    font-size:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:#7a8096;
    font-weight:600;
}

/* MOBILE */

@media(max-width:900px){

    body{
        height:100vh;
        display:flex;
        flex-direction:column;
        overflow:hidden;
    }

    header{
        padding:8px 10px;
    }

    .logo{
        font-size:24px;
    }

    .search{
        width:120px;
        padding:7px 10px;
        font-size:13px;
    }

    .search:focus{
        width:140px;
    }

    .container{
        display:flex;
        flex-direction:column;
        padding:0;
        gap:0;
        flex:1;
        overflow:hidden;
    }

    .player-wrap{
        border:none;
        border-bottom:2px solid #1d2230;
        height:auto;
        flex-shrink:0;
        border-radius:0;
    }

    .list-wrap{
        border:none;
        border-radius:0;
        flex:1;
        height:auto;
    }

    .info-bar{
        padding:8px;
    }

    .ch-info h2{
        font-size:14px;
    }

    .item{
        padding:12px 15px;
    }

    .cat-btn{
        padding:6px 14px;
        font-size:13px;
    }

    footer{
        display:none;
    }

}

::-webkit-scrollbar{
    width:4px;
    background:#111319;
}

::-webkit-scrollbar-thumb{
    background:#2a3350;
}

@keyframes blink{
    50%{
        opacity:0.5;
    }
}

</style>
</head>

<body oncontextmenu="return false;">

<header>

    <div class="logo" onclick="location.reload()">
        Kasta Sports
    </div>

    <div class="search-wrap">
        <input
            type="text"
            class="search"
            placeholder="SEARCH..."
            onkeyup="search(this.value)">
    </div>

</header>

<div class="container">

    <div class="player-wrap" id="playerTarget">

        <div class="video-container">

            <div class="aspect-ratio">

                <iframe
                    id="iframePlayer"
                    allowfullscreen
                    allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
                    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
                    referrerpolicy="no-referrer">
                </iframe>

            </div>

        </div>

        <div class="info-bar">

            <div class="ch-info">

                <h2>
                    <span class="live-badge">LIVE</span>
                    <span id="chName">SELECT CHANNEL</span>
                </h2>

            </div>

            <div id="watermark">Kasta Sports</div>

        </div>

    </div>

    <div class="list-wrap">

        <marquee class="marquee" id="noticeText" scrollamount="4">
            WELCOME TO Kasta Sports - SYSTEM ONLINE
        </marquee>

        <div class="cat-bar" id="catMenu"></div>

        <div class="list-items" id="chList"></div>

    </div>

</div>

<footer>
    <span>VISITORS: 6184</span>
    <span>STATUS: ONLINE</span>
</footer>

<script>
/* JS НЕ ТРОГАЛ */
</script>

</body>
</html>
