<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>

/* =========================
   HARD RESET (Blogspot safe)
========================= */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    background: #000;
    overflow: hidden;
}

/* =========================
   FIX: REMOVE BLOGSPOT GAP
   (це те що давало відступ зверху)
========================= */
body {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
}

/* =========================
   JW STYLE WRAPPER (FULL WIDTH TOP)
========================= */
#player-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    max-width: 100vw;
    margin: 0;
    padding: 0;

    aspect-ratio: 16 / 9;
    background: #000;
    overflow: hidden;
}

/* fallback */
@supports not (aspect-ratio: 16 / 9) {
    #player-wrapper {
        height: calc(100vw * 9 / 16);
    }
}

/* =========================
   PLAYER AREA
========================= */
#player {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    background: #000;
}

/* VK PLAYER FIX */
#player iframe,
#player video {
    width: 100% !important;
    height: 100% !important;
    object-fit: contain !important;
    background: #000 !important;
}

/* =========================
   POSTER (LOCKED TO PLAYER)
========================= */
#myImage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
    z-index: 9999;
    transition: opacity .8s ease;
    pointer-events: none;
}

/* =========================
   SPINNER
========================= */
#spinner {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 50px;
    height: 50px;
    margin: -25px 0 0 -25px;
    border: 5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    z-index: 10000;
    pointer-events: none;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* =========================
   BLOGSPOT / VK TEXT FIX
========================= */
#player * {
    box-sizing: border-box !important;
    writing-mode: horizontal-tb !important;
    text-orientation: mixed !important;
    white-space: nowrap !important;
    word-break: normal !important;
    line-height: normal !important;
}

/* quality menu fix */
#player [class*="quality"],
#player [class*="menu"],
#player [class*="settings"] {
    writing-mode: horizontal-tb !important;
    white-space: nowrap !important;
}

/* =========================
   MOBILE FIX (KEY FIX HERE)
========================= */
@media (max-width: 768px) {

    html, body {
        height: 100%;
        overflow: hidden;
    }

    #player-wrapper {
        width: 100vw;
        left: 0;
        top: 0;
    }
}

</style>
</head>

<body>

<div id="player-wrapper">

    <div id="player"></div>

    <img id="myImage"
         src="https://onestream.live/wp-content/uploads/2023/05/LiveStream-Sports-Events-Full-Guide.gif">

    <div id="spinner"></div>

</div>

<script>
const img = document.getElementById("myImage");
const spinner = document.getElementById("spinner");

setTimeout(() => {
    img.style.opacity = "0";
    spinner.style.opacity = "0";

    setTimeout(() => {
        img.remove();
        spinner.remove();
    }, 800);
}, 3000);
</script>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

<script>
const params = new URLSearchParams(window.location.search);

const streamUrl =
    params.get("url") ||
    "https://live-nstu.cdn-03.cosmonova.net.ua/mobile-app/main/Suspilne-Sport/master.m3u8?key=YcCUSSFsx0Q3YMgtd2OA";

new Playerjs({
    id: "player",
    file: decodeURIComponent(streamUrl),
    poster: "",
    autoplay: 0,
    lang: "en"
});
</script>

</body>
</html>
