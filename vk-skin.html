<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        /* ВАЖЛИВО: все тепер прив’язано до верху */
        #player-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            isolation: isolate;
        }

        #player {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #player video,
        #player iframe {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
            background: black;
        }

        /* POSTER — тепер теж НЕ центрується від viewport */
        #myImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
            z-index: 9999;
            opacity: 1;
            transition: opacity 1s ease-out;
        }

        /* ОРИГІНАЛЬНИЙ СПІНЕР (простий, як був) */
        #spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            border: 5px solid #ccc;
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 10000;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>

<body>

<div id="player-wrapper">
    <img id="myImage" src="https://static3.go3.tv/scale/go3/webuploads/rest/upload/programme/11443963/images/28577507?dsth=202&dstw=360&srcmode=0&quality=80&type=2&srcx=1&srcy=1&srcw=1%2F1&srch=1%2F1">
    <div id="spinner"></div>
    <div id="player"></div>
</div>

<script>
    const image = document.getElementById("myImage");
    const spinner = document.getElementById("spinner");

    setTimeout(() => {
        image.style.opacity = 0;
        spinner.style.opacity = 0;

        setTimeout(() => {
            image.style.display = "none";
            spinner.style.display = "none";
        }, 1000);
    }, 3000);
</script>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

<script>
    const params = new URLSearchParams(window.location.search);

    const streamUrl =
        params.get("url") ||
        "https://bitcdn-kronehit.bitmovin.com/v2/hls/chunklist.m3u8";

    var vs = {
        id: "player",
        file: decodeURIComponent(streamUrl),
        poster: "",
        autoplay: 0,
        lang: "en"
    };

    var player = new Playerjs(vs);
</script>

</body>
</html>
