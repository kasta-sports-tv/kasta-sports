<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        /* ВАЖЛИВО: весь контент тепер "прибитий" до верху */
        #player-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            isolation: isolate;
        }

        #player {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #player video,
        #player iframe {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
            background: black;
        }

        /* POSTER (тепер теж правильно прив'язаний) */
        #myImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: black;
            z-index: 9999;
            opacity: 1;
            transition: opacity 1s ease-out;
        }

        /* SPINNER — повернув "нормальний", стабільний */
        #spinner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 56px;
            height: 56px;
            z-index: 10000;
            border-radius: 50%;
            border: 4px solid rgba(255, 0, 0, 0.2);
            border-top-color: red;
            animation: spin 1.6s linear infinite;
            transition: opacity 1s ease;
        }

        #spinner::after {
            content: "";
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 4px solid transparent;
            border-top-color: red;
            border-right-color: rgba(255,0,0,0.6);
            filter: drop-shadow(0 0 6px red);
            animation: dash 1.6s ease-in-out infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes dash {
            0%   { transform: rotate(0deg) scale(0.85); opacity: 0.6; }
            50%  { transform: rotate(180deg) scale(1); opacity: 1; }
            100% { transform: rotate(360deg) scale(0.85); opacity: 0.6; }
        }
    </style>
</head>

<body>

<div id="player-wrapper">
    <img id="myImage" src="https://static3.go3.tv/scale/go3/webuploads/rest/upload/programme/11443963/images/28577507?dsth=202&dstw=360&srcmode=0&quality=80&type=2&srcx=1&srcy=1&srcw=1%2F1&srch=1%2F1">
    <div id="spinner"></div>
    <div id="player"></div>
</div>

<script>
    const image = document.getElementById("myImage");
    const spinner = document.getElementById("spinner");

    setTimeout(() => {
        image.style.opacity = 0;
        spinner.style.opacity = 0;

        setTimeout(() => {
            image.style.display = "none";
            spinner.style.display = "none";
        }, 1000);
    }, 3000);
</script>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

<script>
    const params = new URLSearchParams(window.location.search);

    const streamUrl =
        params.get("url") ||
        "https://bitcdn-kronehit.bitmovin.com/v2/hls/chunklist.m3u8";

    var vs = {
        id: "player",
        file: decodeURIComponent(streamUrl),
        poster: "",
        autoplay: 0,
        lang: "en"
    };

    var player = new Playerjs(vs);
</script>

</body>
</html>
