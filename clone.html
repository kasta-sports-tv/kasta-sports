<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasta Sports</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: white;
  overflow-x: hidden;
}

/* HEADER */
header {
  position: fixed;
  top:0; left:0; right:0;
  height:70px;
  background: rgba(15,20,35,0.8);
  backdrop-filter: blur(12px);
  display:flex;
  align-items:center;
  justify-content: space-between;
  padding:0 20px;
  z-index:1000;
}

.logo {
  font-size:26px;
  font-weight:900;
}

.logo span:first-child { color:white; }
.logo span:last-child { color:#ff8c2a; }

/* LAYOUT */
.layout {
  display:flex;
  margin-top:70px;
}

/* SIDEBAR */
.sidebar {
  width:28%;
  background: rgba(20,25,45,0.6);
  backdrop-filter: blur(12px);
  padding:10px;
  overflow-y:auto;
}

.tournament-name {
  color:#ff8c2a;
  font-weight:bold;
  margin:10px 0;
}

/* BUTTON */
.stream-btn {
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:14px;
  border:none;
  background: rgba(255,255,255,0.05);
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}

.stream-btn:hover {
  background: rgba(255,140,42,0.2);
  transform: scale(1.03);
}

.stream-btn.active {
  background: linear-gradient(90deg,#ff8c2a,#ff5e00);
}

/* PLAYER */
.player-section {
  width:72%;
  padding:15px;
}

.player-container {
  width:100%;
  padding-bottom:56.25%;
  position:relative;
  border-radius:18px;
  overflow:hidden;
  background:black;
  box-shadow: 0 0 30px rgba(255,140,42,0.2);
}

iframe {
  position:absolute;
  width:100%;
  height:100%;
}

/* SLIDER */
.slider {
  position:absolute;
  width:100%;
  height:100%;
}

.slide {
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  opacity:0;
  transition:opacity 1s;
}

.slide.active {
  opacity:1;
}

.slide::after {
  content:'';
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:40%;
  background:linear-gradient(transparent, rgba(0,0,0,0.9));
}

.slide-title {
  position:absolute;
  bottom:20px;
  left:20px;
  font-size:26px;
  font-weight:bold;
}

/* MATCH INFO */
.match-info {
  display:none;
  justify-content:center;
  margin-top:10px;
}

.match-info.active {
  display:flex;
}
</style>
</head>

<body>

<header>
  <div class="logo"><span>Kasta</span> <span>Sports</span></div>
</header>

<div class="layout">

<div class="sidebar">

<div class="tournament-name">Матчі</div>

<button class="stream-btn" onclick="setStream('https://kasta-sports.vercel.app/vk.html', this)">
Match 1
</button>

<button class="stream-btn" onclick="setStream('https://kasta-sports.vercel.app/vk.html', this)">
Match 2
</button>

</div>

<div class="player-section">

<div class="player-container">

<!-- SLIDER -->
<div class="slider" id="slider">
  <div class="slide active" style="background-image:url('https://img.uefa.com/imgml/TP/players/2024/2024/324x324/250043268.jpg')">
    <div class="slide-title">Champions League</div>
  </div>
  <div class="slide" style="background-image:url('https://cdn.football.ua/images/news/640x360/529155.jpg')">
    <div class="slide-title">Premier League</div>
  </div>
</div>

<iframe id="mainPlayer"></iframe>

</div>

<div class="match-info" id="matchInfo"></div>

</div>

</div>

<script>

/* ТВОЯ ЛОГІКА НЕ ЧІПАВ */
function setStream(url, btn) {
  const iframe = document.getElementById('mainPlayer');
  document.getElementById('slider').style.display='none';

  document.querySelectorAll('.stream-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  iframe.src=url;
}

/* SLIDER */
let slides = document.querySelectorAll('.slide');
let index = 0;

setInterval(()=>{
  slides[index].classList.remove('active');
  index = (index+1) % slides.length;
  slides[index].classList.add('active');
},4000);

</script>

</body>
</html>
