<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasta Sports</title>

<style>
body {
  background: #0e1118;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  color: #e5e7eb;
  overflow-x: hidden;
  height: 100vh;
  overflow-y: hidden;
}

/* HEADER */
header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 68px;
  background: rgba(14,17,24,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  padding: 0 15px;
  z-index: 1000;
}

.header-content {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
}

.logo {
  font-size: 28px;
  font-weight: 900;
}

.logo .kasta { color: #fff; }
.logo .sports {
  background: linear-gradient(90deg, #6366f1, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* MATCH INFO */
.match-info {
  display: none;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  font-size: 17px;
  font-weight: 600;
  overflow: hidden;
}

.match-info.active {
  display: flex;
}

.match-info span {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 140px; /* 🔥 СТИСКАЄ */
  text-shadow: 0 0 8px rgba(99,102,241,0.7);
}

.match-info img {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* LAYOUT */
.layout {
  display: flex;
  height: calc(100vh - 68px);
  margin-top: 68px;
}

.sidebar {
  width: 28%;
  min-width: 180px;
  background: rgba(14,17,24,0.75);
  backdrop-filter: blur(10px);
  padding: 10px;
  overflow-y: auto;
}

/* TOURNAMENT */
.tournament-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 12px 0;
}

.tournament-name {
  color: #60a5fa;
  font-weight: 800;
  font-size: 20px;
  white-space: nowrap; /* 🔥 В ОДИН РЯДОК */
}

/* PLAYER */
.player-section {
  width: 72%;
  display: flex;
  flex-direction: column;
  padding: 10px;
}

.player-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(0,0,0,0.9);
}

iframe {
  position: absolute;
  width: 100%;
  height: 100%;
  border: none;
}

/* TEXT */
.select-text {
  margin-top: 12px;
  text-align: center;
}

/* BUTTONS */
.stream-btn {
  width: 100%;
  background: #1a1e2a;
  color: #e5e7eb;
  border: 1px solid rgba(255,255,255,0.06);
  padding: 12px 8px;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center; /* 🔥 ЦЕНТР ВЕРТИКАЛЬ */
  justify-content: space-between;
  transition: 0.25s;
  margin-bottom: 6px;
}

.stream-btn:hover {
  background: #23293a;
  transform: scale(1.03);
  box-shadow: 0 0 20px rgba(99,102,241,0.25);
}

.stream-btn.active {
  background: linear-gradient(90deg, #6366f1, #38bdf8);
}

/* TEAM */
.team {
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 600; /* 🔥 ТРОХИ ЖИРНІШЕ */
}

.team img {
  width: 22px;
  height: 22px;
  border-radius: 50%;
}

.match-time {
  font-weight: 700;
  display: flex;
  align-items: center; /* 🔥 ІДЕАЛЬНО ПО ЦЕНТРУ */
}

/* MOBILE */
@media (max-width: 768px) {
  body {
    height: auto;
    overflow-y: auto;
  }

  .layout {
    flex-direction: column;
  }

  .sidebar {
    width: 95%;
    max-height: 280px;
    order: 2;
  }

  .player-section {
    width: 95%;
    order: 1;
  }

  .match-info span {
    max-width: 90px;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-content">
    <div class="logo">
      <span class="kasta">Kasta</span>
      <span class="sports">Sports</span>
    </div>
  </div>
</header>

<div class="layout">

  <div class="sidebar">

    <div class="tournament-header">
      <img src="https://storage.livescore.com/images/competition/high/2023-europa-league-1.png">
      <div class="tournament-name">Ліга Конференцій</div>
    </div>

    <button class="stream-btn" onclick="setStream('https://kasta-sports.vercel.app/vk.html', this,
    'https://s1.vcdn.biz/static/f/6411632851/image.jpg','Райо Вальєкано','22:00','Страсбур',
    'https://s2.vcdn.biz/static/f/6503182931/image.jpg')">

      <div class="team">
        <img src="https://s1.vcdn.biz/static/f/6411632851/image.jpg">
        Райо Вальєкано
      </div>

      <div class="match-time">22:00</div>

      <div class="team">
        Страсбур
        <img src="https://s2.vcdn.biz/static/f/6503182931/image.jpg">
      </div>

    </button>

  </div>

  <div class="player-section">

    <div class="player-container">
      <iframe id="mainPlayer" src="" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
      allow="fullscreen; autoplay; encrypted-media; picture-in-picture; orientation-lock" allowfullscreen></iframe>
    </div>

    <div class="select-text" id="selectText">Оберіть трансляцію</div>

    <div class="match-info" id="matchInfo">
      <img id="team1Img">
      <span id="team1Name"></span>
      <span id="matchTime"></span>
      <span id="team2Name"></span>
      <img id="team2Img">
    </div>

  </div>

</div>

<script>
function setStream(url, btn, img1, t1, time, t2, img2) {
  const iframe = document.getElementById('mainPlayer');
  const matchInfo = document.getElementById('matchInfo');
  const selectText = document.getElementById('selectText');

  document.querySelectorAll('.stream-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  iframe.src = url;
  selectText.style.display = 'none';

  document.getElementById('team1Img').src = img1;
  document.getElementById('team2Img').src = img2;
  document.getElementById('team1Name').innerText = t1;
  document.getElementById('team2Name').innerText = t2;
  document.getElementById('matchTime').innerText = time;

  matchInfo.classList.add('active');
}
</script>

</body>
</html>
