<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasta Sports</title>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  color: #e5e7eb;
  overflow-x: hidden;
  height: 100vh;
  overflow-y: hidden;
}

/* ==================== ХЕДЕР ==================== */
header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 68px;
  background: rgba(15, 23, 42, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  padding: 0 15px;
  z-index: 1000;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
}

.header-content {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 28px;
  font-weight: 900;
  letter-spacing: 1px;
}

.logo .kasta {
  color: #ffffff;
  text-shadow: 0 0 10px rgba(255,255,255,0.4);
}

.logo .sports {
  background: linear-gradient(90deg, #38bdf8, #6366f1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hamburger {
  display: none;
  font-size: 28px;
  cursor: pointer;
  padding: 8px;
  border-radius: 8px;
}

/* ==================== MATCH INFO ==================== */
.match-info {
  display: none;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 12px;
  font-size: 22px;
  font-weight: bold;
  flex-wrap: wrap;
  text-align: center;
}

.match-info.active {
  display: flex;
}

.match-info span {
  text-shadow: 0 0 8px rgba(99,102,241,0.8);
}

.match-info img {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  object-fit: cover;
}

/* ==================== ОСНОВНИЙ КОНТЕНТ ==================== */
.layout {
  display: flex;
  height: calc(100vh - 68px);
  max-height: calc(100vh - 68px);
  overflow: hidden;
  margin-top: 68px;
}

.sidebar {
  width: 28%;
  min-width: 180px;
  background: rgba(15, 23, 42, 0.6);
  backdrop-filter: blur(10px);
  padding: 10px;
  overflow-y: auto;
}

.tournament-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 12px 0 6px;
}

.tournament-header img {
  width: 42px;
  height: 42px;
  border-radius: 6px;
  object-fit: contain;
}

.tournament-name {
  color: #60a5fa;
  font-weight: 800;
  font-size: 20px;
}

.player-section {
  width: 72%;
  display: flex;
  flex-direction: column;
  padding: 10px;
}

.player-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  background-color: black;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  overflow: hidden;
  box-shadow: 0 0 40px rgba(99,102,241,0.25);
}

iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}

.select-text {
  margin-top: 12px;
  font-size: 18px;
  text-align: center;
  opacity: 0.9;
  text-shadow: 0 0 8px rgba(99,102,241,0.6);
}

.stream-btn {
  width: 100%;
  background: rgba(30, 41, 59, 0.6);
  color: white;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 12px 8px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  transition: all 0.25s ease;
  margin-bottom: 6px;
}

.stream-btn:hover {
  background: rgba(99,102,241,0.25);
  transform: scale(1.03);
  box-shadow: 0 0 15px rgba(99,102,241,0.4);
}

.stream-btn.active {
  background: linear-gradient(90deg, #6366f1, #38bdf8);
  border: none;
}

.team {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 15px;
  flex: 1;
  justify-content: center;
  text-align: center;
}

.team img {
  width: 24px;
  height: 24px;
  border-radius: 50%;
}

.match-time {
  width: 55px;
  text-align: center;
  font-size: 15px;
  font-weight: bold;
}

/* ==================== АДАПТИВ ==================== */
@media (max-width: 768px) {
  body {
    height: auto;
    overflow-y: auto;
  }

  header { height: 60px; }
  .logo { font-size: 24px; }
  .hamburger { display: block; }

  .layout {
    flex-direction: column;
    height: auto;
    margin-top: 60px;
  }

  .sidebar {
    width: 95%;
    max-height: 280px;
    order: 2;
  }

  .player-section {
    width: 95%;
    order: 1;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-content">
    <div class="logo">
      <span class="kasta">Kasta</span>
      <span class="sports">Sports</span>
    </div>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
  </div>
</header>

<div class="layout">

  <div class="sidebar">

    <div class="tournament-header">
      <img src="https://storage.livescore.com/images/competition/high/2023-europa-league-1.png">
      <div class="tournament-name">Ліга Конференцій</div>
    </div>

    <button class="stream-btn" onclick="setStream('https://kasta-sports.vercel.app/vk.html', this,
    'https://s1.vcdn.biz/static/f/6411632851/image.jpg','Райо Вальєкано','vs','Страсбур',
    'https://s2.vcdn.biz/static/f/6503182931/image.jpg')">

      <div class="team">
        <img src="https://s1.vcdn.biz/static/f/6411632851/image.jpg">
        Райо Вальєкано
      </div>

      <div class="match-time">22:00</div>

      <div class="team">
        Страсбур
        <img src="https://s2.vcdn.biz/static/f/6503182931/image.jpg">
      </div>

    </button>

  </div>

  <div class="player-section">

    <div class="player-container">
      <iframe id="mainPlayer" src="" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
      allow="fullscreen; autoplay; encrypted-media; picture-in-picture; orientation-lock" allowfullscreen></iframe>
    </div>

    <div class="select-text">Оберіть трансляцію</div>

  </div>

</div>

<script>
function setStream(url, btn, img1, t1, time, t2, img2) {
  const iframe = document.getElementById('mainPlayer');
  document.querySelectorAll('.stream-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  iframe.src = url;
  document.querySelector('.select-text').style.display = 'none';
}

function toggleMenu() {
  alert("Меню можна додати пізніше");
}
</script>

</body>
</html>
