<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasta Sports</title>

  <style>
    body {
      background: #0e1118;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: white;
      overflow-x: hidden;
      height: 100vh;
      overflow-y: hidden;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 68px;
      background: rgba(8, 10, 15, 0.98);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #222838;
      display: flex;
      align-items: center;
      padding: 0 15px;
      z-index: 1000;
    }

    .header-content {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 28px;
      font-weight: 900;
      white-space: nowrap;
    }

    .logo .kasta { color: #ffffff; }
    .logo .sports { color: #ff1a1a; }

    .match-info {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: nowrap;
      white-space: nowrap;
      overflow: hidden;
      max-width: 100%;
      width: 100%;
      font-weight: bold;
    }

    .match-info.active {
      display: flex;
    }

    .match-info span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: clamp(10px, 3.5vw, 22px);
      max-width: 28%;
    }

    .match-info img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .layout {
      display: flex;
      height: calc(100dvh - 68px);
      margin-top: 68px;
      overflow: hidden;
    }

    .sidebar {
      width: 28%;
      min-width: 180px;
      background: #1a1e2a;
      padding: 10px;
      overflow-y: auto;
    }

    .tournament-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 12px 0 6px;
    }

    .tournament-header img {
      width: 42px;
      height: 42px;
      border-radius: 6px;
      object-fit: contain;
    }

    .tournament-name {
      color: #bfc7d5;
      font-weight: 800;
      font-size: 18px;
    }

    .stream-btn {
      width: 100%;
      background-color: #1a1e2a;
      color: white;
      border: 1px solid #2b3244;
      padding: 12px 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: 0.25s;
    }

    .stream-btn:hover {
      background-color: #222838;
      transform: scale(1.03);
      border-color: #3a425a;
    }

    .stream-btn.active {
      background-color: #2a3142;
      border-color: #4a556f;
      box-shadow: 0 0 10px rgba(0,0,0,0.6);
    }

    .team {
      display: flex;
      align-items: center;
      gap: 7px;
      justify-content: center;
      flex: 1;
      text-align: center;
    }

    .team img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .match-time {
      width: 55px;
      text-align: center;
      font-weight: bold;
      flex-shrink: 0;
    }

    .player-section {
      width: 72%;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .player-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: black;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 12px 35px rgba(0,0,0,0.75);
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
    }

    .slider {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    .slide {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: fill;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .slide.active {
      opacity: 1;
    }

    .select-text {
      margin-top: 12px;
      text-align: center;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }
      .sidebar, .player-section {
        width: 95%;
      }
    }

    /* ===== CHAT ===== */

    #chat-wrapper {
      position: fixed;
      top: 80px;
      right: 20px;
      width: 200px;
      height: 300px;
      z-index: 9999;
      display: none;
    }

    #chat-toggle {
      width: 40px;
      height: 40px;
      border: 1px solid #2b3244;
      background: #1a1e2a;
      border-radius: 8px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<header>
  <div class="header-content">
    <div class="logo">
      <span class="kasta">Kasta</span>
      <span class="sports">Sports</span>
    </div>

    <!-- КНОПКА ЧАТУ (твоя, без дизайну) -->
    <div id="chat-toggle"></div>

  </div>
</header>

<div class="layout">

  <div class="sidebar">
    <!-- твій код без змін -->
    <div class="tournament-header">
      <img src="https://static.flashscore.com/res/image/data/QexI2ehD-OCwQhZeh.png">
      <div class="tournament-name">Кубок Туреччини</div>
    </div>

    <button class="stream-btn">...</button>
  </div>

  <div class="player-section">
    <div class="player-container">
      <div class="slider" id="slider"></div>
      <iframe id="mainPlayer"></iframe>
    </div>
  </div>

</div>

<!-- CHAT -->
<div id="chat-wrapper">
  <script id="cid0020000439054751580" data-cfasync="false" async 
  src="//st.chatango.com/js/gz/emb.js"
  style="width: 200px;height: 300px;">
  {
    "handle":"deltest",
    "arch":"js",
    "styles":{
      "a":"CC0000",
      "b":100,
      "c":"FFFFFF",
      "d":"FFFFFF",
      "k":"CC0000",
      "l":"CC0000",
      "m":"CC0000",
      "n":"FFFFFF",
      "p":"10",
      "q":"CC0000",
      "r":100,
      "cv":1,
      "cvfntsz":"18px",
      "cvfntw":"bolder",
      "cvbg":"CC0000",
      "cvw":72,
      "cvh":41
    }
  }
  </script>
</div>

<script>
document.getElementById("chat-toggle").onclick = function () {
  const chat = document.getElementById("chat-wrapper");
  chat.style.display = chat.style.display === "block" ? "none" : "block";
};
</script>

</body>
</html>
