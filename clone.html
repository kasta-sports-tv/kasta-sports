<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasta Sports</title>

  <style>
    body {
      background: #0e1118;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: white;
      overflow-x: hidden;
      height: 100vh;
      overflow-y: hidden;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 68px;
      background: rgba(10, 12, 18, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #2a2f3d;
      display: flex;
      align-items: center;
      padding: 0 15px;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }

    .header-content {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 28px;
      font-weight: 900;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
      white-space: nowrap;
    }

    .logo .kasta { color: #ffffff; }
    .logo .sports { color: #ff2b2b; }

    .hamburger {
      display: none;
      font-size: 28px;
      cursor: pointer;
      padding: 8px;
    }

    /* MATCH INFO */
    .match-info {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    }

    .match-info.active {
      display: flex;
    }

    .match-info img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    /* LAYOUT */
    .layout {
      display: flex;
      height: calc(100vh - 68px);
      margin-top: 68px;
      overflow: hidden;
    }

    .sidebar {
      width: 28%;
      min-width: 180px;
      background: rgba(0,0,0,0.25);
      padding: 10px;
      overflow-y: auto;
    }

    .tournament-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 12px 0 6px;
    }

    .tournament-header img {
      width: 42px;
      height: 42px;
      border-radius: 6px;
    }

    .tournament-name {
      color: #c7c7c7;
      font-weight: 700;
      font-size: 18px;
    }

    /* BUTTONS */
    .stream-btn {
      width: 100%;
      background: #1a1e2a;
      color: white;
      border: 1px solid #2e3446;
      padding: 12px 8px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: 0.25s;
    }

    .stream-btn:hover {
      transform: scale(1.02);
      border-color: #4a5166;
      background: #222838;
    }

    .stream-btn.active {
      background: #2a0f14;
      border-color: #ff2b2b;
      box-shadow: 0 0 12px rgba(255,0,0,0.15);
    }

    .team {
      display: flex;
      align-items: center;
      gap: 7px;
      justify-content: center;
      flex: 1;
    }

    .team img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }

    /* PLAYER */
    .player-section {
      width: 72%;
      display: flex;
      flex-direction: column;
      padding: 10px;
    }

    .player-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background: black;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 35px rgba(0,0,0,0.7);
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .select-text {
      margin-top: 12px;
      text-align: center;
      opacity: 0.8;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      body { overflow-y: auto; }

      .layout {
        flex-direction: column;
        height: auto;
      }

      .sidebar {
        width: 95%;
        order: 2;
      }

      .player-section {
        width: 95%;
        order: 1;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="header-content">
    <div class="logo">
      <span class="kasta">Kasta</span>
      <span class="sports">Sports</span>
    </div>
    <div class="hamburger">☰</div>
  </div>
</header>

<div class="layout">

  <div class="sidebar">

    <div class="tournament-header">
      <img src="https://storage.livescore.com/images/competition/high/2023-europa-league-1.png">
      <div class="tournament-name">Ліга Конференцій</div>
    </div>

    <button class="stream-btn"
      onclick="setStream('https://kasta-sports.vercel.app/vk.html', this,
      'https://s1.vcdn.biz/static/f/6411632851/image.jpg',
      'Райо Вальєкано','22:00','Страсбур',
      'https://s2.vcdn.biz/static/f/6503182931/image.jpg')">

      <img src="https://s1.vcdn.biz/static/f/6411632851/image.jpg" width="24">
      Райо Вальєкано
      22:00
      Страсбур
      <img src="https://s2.vcdn.biz/static/f/6503182931/image.jpg" width="24">
    </button>

  </div>

  <div class="player-section">

    <div class="player-container">
      <iframe id="mainPlayer" allowfullscreen></iframe>
    </div>

    <div class="select-text" id="selectText">Оберіть трансляцію</div>

    <!-- FIXED MATCH INFO -->
    <div class="match-info" id="matchInfo">
      <img id="team1Img">
      <span id="team1Name"></span>
      <span id="matchTime"></span>
      <span id="team2Name"></span>
      <img id="team2Img">
    </div>

  </div>

</div>

<script>
function setStream(url, btn, img1, t1, time, t2, img2) {
  const iframe = document.getElementById('mainPlayer');
  const matchInfo = document.getElementById('matchInfo');
  const selectText = document.getElementById('selectText');

  document.querySelectorAll('.stream-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  iframe.src = url;
  selectText.style.display = 'none';

  document.getElementById('team1Img').src = img1;
  document.getElementById('team2Img').src = img2;
  document.getElementById('team1Name').innerText = t1;
  document.getElementById('team2Name').innerText = t2;
  document.getElementById('matchTime').innerText = time;

  matchInfo.classList.add('active');
}
</script>

</body>
</html>
