<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="google-site-verification" content="-SWuspthxR-vXpOxIoqwNKlsa9nYdTpoo6OfBlKECr4" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kasta Sports</title>
  <style>
    body {
      background: url('https://kasta-sports-tv.github.io/iptv/logo/site-poster.jpg') no-repeat center center fixed;
      background-size: cover;
      background-color: #0a0a0a;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      color: white;
      overflow-x: hidden;
      height: 100vh;
      overflow-y: hidden;
    }

    /* ==================== ХЕДЕР ==================== */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 68px;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 2px solid #e60000;
      display: flex;
      align-items: center;
      padding: 0 15px;
      z-index: 1000;
      box-shadow: 0 2px 10px rgba(230, 0, 0, 0.3);
    }

    .header-content {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 28px;
      font-weight: 900;
      text-shadow: 0 0 8px rgba(255,255,255,0.6), 0 0 12px #e60000;
      white-space: nowrap;
    }

    .logo .kasta { color: #ffffff; }
    .logo .sports { color: #ff1a1a; }

    .hamburger {
      display: none;
      font-size: 28px;
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
    }

    /* ==================== MATCH INFO ==================== */
    .match-info {
      display: none;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      font-size: 22px;
      font-weight: bold;
      flex-wrap: wrap;
      text-align: center;
    }

    .match-info.active {
      display: flex;
    }

    .match-info span {
      text-shadow: 0 0 6px #ff1a1a, 0 0 12px #990000;
      padding: 0 4px;
    }

    .match-info img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    /* ==================== ОСНОВНИЙ КОНТЕНТ ==================== */
    .layout {
      display: flex;
      height: calc(100vh - 68px);
      max-height: calc(100vh - 68px);
      overflow: hidden;
      margin-top: 68px;
    }

    .sidebar {
      width: 28%;
      min-width: 180px;
      background: rgba(15, 15, 15, 0.88);
      padding: 10px;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .tournament-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 12px 0 6px;
    }

    .tournament-header img {
      width: 42px;
      height: 42px;
      border-radius: 6px;
      object-fit: contain;
    }

    .tournament-name {
      color: #ff1a1a;
      font-weight: 800;
      font-size: 20px;
      white-space: nowrap;
    }

    .player-section {
      width: 72%;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 10px;
      overflow: hidden;
    }

    .player-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      background-color: black;
      border-radius: 12px;
      border: 3px solid #e60000;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(230, 0, 0, 0.35);
    }

    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .select-text {
      margin-top: 12px;
      font-size: 18px;
      text-align: center;
      opacity: 0.9;
      text-shadow: 0 0 6px #ff1a1a, 0 0 12px #990000;
    }

    .stream-btn {
      width: 100%;
      background-color: rgba(30, 30, 30, 0.85);
      color: white;
      border: 2px solid #444;
      padding: 12px 8px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      transition: all 0.3s;
      margin-bottom: 8px;
    }

    .stream-btn:hover {
      background-color: rgba(230, 0, 0, 0.2);
      border-color: #ff1a1a;
      transform: scale(1.04);
    }

    .stream-btn.active {
      background-color: rgba(230, 0, 0, 0.35);
      border-color: #ff1a1a;
    }

    .team {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 15px;
      flex: 1;
      justify-content: center;
      text-align: center;
      text-shadow: 0 0 6px #990000;
    }

    .team img {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .match-time {
      width: 55px;
      text-align: center;
      font-size: 15px;
      font-weight: bold;
      flex-shrink: 0;
      text-shadow: 0 0 6px #990000;
    }

    /* ==================== АДАПТИВ ==================== */
    @media (max-width: 768px) {
      body {
        height: auto;
        overflow-y: auto;
      }

      header { height: 60px; }

      .logo { font-size: 24px; }

      .hamburger { display: block; }

      .layout {
        flex-direction: column;
        height: auto;
        margin-top: 60px;
      }

      .sidebar {
        width: 95%;
        max-height: 280px;
        order: 2;
      }

      .player-section {
        width: 95%;
        order: 1;
      }

      .match-info {
        font-size: 17px;
        gap: 8px;
      }

      .match-info img {
        width: 34px;
        height: 34px;
      }

      .match-info span {
        font-size: 15px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 140px;
      }
    }

    @media (max-width: 480px) {
      .match-info span {
        max-width: 110px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

  <!-- ХЕДЕР -->
  <header>
    <div class="header-content">
      <div style="display: flex; align-items: center;">
        <div class="logo">
          <span class="kasta">Kasta</span>
          <span class="sports">Sports</span>
        </div>
      </div>

      <div style="display: flex; align-items: center; gap: 15px;">
        <div class="menu"></div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
      </div>
    </div>
  </header>

  <div class="layout">
    <div class="sidebar" id="streamButtons">
      <!-- Весь твій контент сайдбару без змін -->
      <div class="tournament-header">
        <img src="https://storage.livescore.com/images/competition/high/2023-europa-league-1.png" alt="">
        <div class="tournament-name">Ліга Конференцій</div>
      </div>

      <button class="stream-btn" onclick="setStream('https://kasta-sports.vercel.app/vk.html', this,
        'https://s1.vcdn.biz/static/f/6411632851/image.jpg','Райо Вальєкано','vs','Страсбур',
        'https://s2.vcdn.biz/static/f/6503182931/image.jpg')">
        <span class="team">
          <img src="https://s1.vcdn.biz/static/f/6411632851/image.jpg" alt="">
          Райо Вальєкано
        </span>
        <span class="match-time">22:00</span>
        <span class="team">
          Страсбур
          <img src="https://s2.vcdn.biz/static/f/6503182931/image.jpg" alt="">
        </span>
      </button>

      <div class="tournament-header">
        <img src="https://crystalpng.com/wp-content/uploads/2025/06/F1-01.png" alt="">
        <div class="tournament-name">Формула-1</div>
      </div>

      <button class="stream-btn" onclick="setStream('https://sportkastv.blogspot.com/2026/02/kasta-sports-6.html', this,
        'https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png','Кваліфікація','vs','Кваліфікація',
        'https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png')">
        <span class="team">
          <img src="https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png" alt="">
          Кваліфікація
        </span>
        <span class="match-time">23:00</span>
        <span class="team">
          Кваліфікація
          <img src="https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png" alt="">
        </span>
      </button>

      <!-- Інші кнопки -->
      <button class="stream-btn" onclick="setStream('https://sportkastv.blogspot.com/2026/02/kasta-sports-6.html', this,
        'https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png','Кваліфікація','vs','Кваліфікація',
        'https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png')">
        <span class="team">
          <img src="https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png" alt="">
          Кваліфікація
        </span>
        <span class="match-time">23:00</span>
        <span class="team">
          Кваліфікація
          <img src="https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png" alt="">
        </span>
      </button>

      <button class="stream-btn" onclick="setStream('https://sportkastv.blogspot.com/2026/02/kasta-sports-6.html', this,
        'https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png','Кваліфікація','vs','Кваліфікація',
        'https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png')">
        <span class="team">
          <img src="https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png" alt="">
          Кваліфікація
        </span>
        <span class="match-time">23:00</span>
        <span class="team">
          Кваліфікація
          <img src="https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png" alt="">
        </span>
      </button>

      <button class="stream-btn" onclick="setStream('https://sportkastv.blogspot.com/2026/02/kasta-sports-6.html', this,
        'https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png','Кваліфікація','vs','Кваліфікація',
        'https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png')">
        <span class="team">
          <img src="https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png" alt="">
          Кваліфікація
        </span>
        <span class="match-time">23:00</span>
        <span class="team">
          Кваліфікація
          <img src="https://crystalpng.com/wp-content/uploads/2025/06/F1-02.png" alt="">
        </span>
      </button>
    </div>

    <div class="player-section">
      <div class="player-container">
        <iframe id="mainPlayer" src="" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
          allow="fullscreen; autoplay; encrypted-media; picture-in-picture; orientation-lock" allowfullscreen></iframe>
      </div>

      <div class="select-text" id="selectText">Оберіть трансляцію</div>

      <div class="match-info" id="matchInfo">
        <img id="team1Img" src="">
        <span id="team1Name"></span>
        <span id="matchTime"></span>
        <span id="team2Name"></span>
        <img id="team2Img" src="">
      </div>
    </div>
  </div>

  <script>
    function setStream(url, btn, img1, t1, time, t2, img2) {
      const iframe = document.getElementById('mainPlayer');
      const matchInfo = document.getElementById('matchInfo');
      const selectText = document.getElementById('selectText');

      document.querySelectorAll('.stream-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      iframe.src = url;
      selectText.style.display = 'none';

      document.getElementById('team1Img').src = img1;
      document.getElementById('team2Img').src = img2;
      document.getElementById('team1Name').innerText = t1;
      document.getElementById('team2Name').innerText = t2;
      document.getElementById('matchTime').innerText = time;
      matchInfo.classList.add('active');
    }

    function toggleMenu() {
      alert("Меню (тут можна додати пункти пізніше)");
    }

    document.addEventListener('fullscreenchange', async () => {
      if (document.fullscreenElement) {
        try { await screen.orientation.lock('landscape'); } catch {}
      } else {
        try { await screen.orientation.unlock(); } catch {}
      }
    });
  </script>
</body>
</html>
