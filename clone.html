<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasta Sports - Прямі трансляції</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --primary: #ff2d55;
            --dark: #0a0a0a;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--dark);
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            z-index: 200;
            transition: transform 0.3s ease;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                height: 100%;
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }
        
        .logo {
            padding: 20px;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ccc;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .nav-item:hover, .nav-item.active {
            background: #1a1a1a;
            color: white;
        }
        
        .nav-item i {
            width: 24px;
        }
        
        /* Main Content */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .player-area {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .player {
            width: 100%;
            height: 100%;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .slides {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            color: #aaa;
        }
        
        .slides h1 {
            font-size: 42px;
            margin-bottom: 10px;
            color: var(--primary);
        }
        
        /* Match Bar */
        .match-bar {
            height: 110px;
            background: #111;
            border-top: 1px solid #222;
            overflow-x: auto;
            white-space: nowrap;
            padding: 12px 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            scrollbar-width: thin;
        }
        
        .match-card {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            min-width: 160px;
            padding: 8px 12px;
            background: #1a1a1a;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .match-card.active {
            border-color: var(--primary);
            background: #1f1f1f;
        }
        
        .match-card:hover {
            transform: scale(1.05);
        }
        
        .teams {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }
        
        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }
        
        .team-logo {
            font-size: 28px;
            margin-bottom: 4px;
        }
        
        .team-name {
            font-size: 13px;
            font-weight: 600;
        }
        
        .time {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
            padding: 0 8px;
        }
        
        /* Match Info */
        .match-info {
            padding: 12px 20px;
            background: #111;
            border-top: 1px solid #222;
            font-weight: 600;
            font-size: 17px;
            display: none;
        }
        
        /* Top Bar */
        .top-bar {
            height: 60px;
            background: rgba(10,10,10,0.95);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            z-index: 100;
        }
        
        .btn {
            background: #1f1f1f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .btn-primary {
            background: var(--primary);
            color: black;
            font-weight: 600;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fas fa-futbol"></i>
                <span>KASTA</span>
                <span style="color:#fff;">SPORTS</span>
            </div>
            
            <div class="nav-item active" onclick="switchSection(0)">
                <i class="fas fa-tv"></i>
                <span>Прямі трансляції</span>
            </div>
            <div class="nav-item" onclick="switchSection(1)">
                <i class="fas fa-futbol"></i>
                <span>Футбол</span>
            </div>
            <div class="nav-item" onclick="switchSection(2)">
                <i class="fas fa-basketball-ball"></i>
                <span>Баскетбол</span>
            </div>
            <div class="nav-item" onclick="switchSection(3)">
                <i class="fas fa-hockey-puck"></i>
                <span>Хокей</span>
            </div>
            <div class="nav-item" onclick="switchSection(4)">
                <i class="fas fa-radio"></i>
                <span>Радіо / Інше</span>
            </div>
        </div>
        
        <!-- Main -->
        <div class="main">
            <div class="top-bar">
                <button class="btn" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <div style="font-weight:700; font-size:20px; color:var(--primary);">KASTA SPORTS</div>
                <button class="btn btn-primary" onclick="addCustomStream()">
                    <i class="fas fa-plus"></i> Свій стрім
                </button>
            </div>
            
            <!-- Player -->
            <div class="player-area" id="playerArea">
                <div class="player" id="player">
                    <!-- Slides by default -->
                    <div class="slides" id="slides">
                        <h1>ГОЛОВНІ ПОДІЇ</h1>
                        <p style="margin-top:20px; font-size:18px;">Оберіть матч нижче для перегляду</p>
                    </div>
                </div>
            </div>
            
            <!-- Match Info -->
            <div class="match-info" id="matchInfo"></div>
            
            <!-- Match Bar -->
            <div class="match-bar" id="matchBar">
                <!-- Заповнюється JS -->
            </div>
        </div>
    </div>

    <script>
        // Приклади матчів
        const matches = [
            {
                id: 1,
                league: "УПЛ",
                team1: "Динамо К",
                logo1: "💙",
                team2: "Шахтар",
                logo2: "🟡",
                time: "19:30",
                url: "https://www.youtube.com/embed/live_stream?channel=example", // заміни на реальний embed
                title: "Динамо Київ — Шахтар Донецьк"
            },
            {
                id: 2,
                league: "АПЛ",
                team1: "Арсенал",
                logo1: "🔴",
                team2: "Ліверпуль",
                logo2: "🔴",
                time: "22:00",
                url: "",
                title: "Арсенал — Ліверпуль"
            },
            {
                id: 3,
                league: "ЛЧ",
                team1: "Реал",
                logo1: "⚪",
                team2: "Баварія",
                logo2: "🔴",
                time: "21:00",
                url: "https://www.youtube.com/embed/dQw4w9wgxcq",
                title: "Реал Мадрид — Баварія Мюнхен"
            },
            {
                id: 4,
                league: "NBA",
                team1: "Лейкерс",
                logo1: "🟡",
                team2: "Бостон",
                logo2: "🟢",
                time: "02:30",
                url: "",
                title: "Лос-Анджелес Лейкерс — Бостон Селтікс"
            }
        ];
        
        let currentMatch = null;
        
        function renderMatchBar() {
            const bar = document.getElementById('matchBar');
            bar.innerHTML = '';
            
            matches.forEach(match => {
                const card = document.createElement('div');
                card.className = `match-card ${currentMatch && currentMatch.id === match.id ? 'active' : ''}`;
                card.innerHTML = `
                    <div style="font-size:12px; color:#888; margin-bottom:6px;">${match.league}</div>
                    <div class="teams">
                        <div class="team">
                            <div class="team-logo">${match.logo1}</div>
                            <div class="team-name">${match.team1}</div>
                        </div>
                        <div class="time">${match.time}</div>
                        <div class="team">
                            <div class="team-logo">${match.logo2}</div>
                            <div class="team-name">${match.team2}</div>
                        </div>
                    </div>
                `;
                card.onclick = () => playMatch(match);
                bar.appendChild(card);
            });
        }
        
        function playMatch(match) {
            currentMatch = match;
            
            const player = document.getElementById('player');
            const slides = document.getElementById('slides');
            const info = document.getElementById('matchInfo');
            
            slides.style.display = 'none';
            
            if (match.url) {
                player.innerHTML = `<iframe src="${match.url}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
            } else {
                player.innerHTML = `
                    <div style="text-align:center; color:#666; font-size:24px;">
                        <i class="fas fa-tv" style="font-size:80px; margin-bottom:20px;"></i><br>
                        Трансляція скоро розпочнеться
                    </div>`;
            }
            
            info.textContent = match.title;
            info.style.display = 'block';
            
            renderMatchBar();
        }
        
        function addCustomStream() {
            const url = prompt("Вставте посилання на стрім (iframe src):", "https://www.youtube.com/embed/");
            if (!url) return;
            
            const player = document.getElementById('player');
            const slides = document.getElementById('slides');
            const info = document.getElementById('matchInfo');
            
            slides.style.display = 'none';
            player.innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
            info.textContent = "Кастомна трансляція";
            info.style.display = 'block';
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        
        function switchSection(n) {
            // Можна розширити логіку для різних розділів
            document.querySelectorAll('.nav-item').forEach((el, i) => {
                el.classList.toggle('active', i === n);
            });
        }
        
        // Закриття меню при кліку поза ним на мобілці
        document.addEventListener('click', function(e) {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth <= 768 && 
                !sidebar.contains(e.target) && 
                sidebar.classList.contains('open')) {
                sidebar.classList.remove('open');
            }
        });
        
        // Ініціалізація
        window.onload = function() {
            renderMatchBar();
            
            // Авто-вибір першого матчу через 1 сек
            setTimeout(() => {
                if (matches.length > 0) playMatch(matches[0]);
            }, 1200);
            
            console.log('%cKasta Sports — готовий клон', 'color:#ff2d55; font-size:18px;');
        };
        
        // Swipe для мобілки
        let touchStartX = 0;
        document.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        document.addEventListener('touchend', e => {
            const diff = e.changedTouches[0].screenX - touchStartX;
            if (diff > 120) document.getElementById('sidebar').classList.add('open');
            if (diff < -120) document.getElementById('sidebar').classList.remove('open');
        });
    </script>
</body>
</html>
