<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kasta Sports - Прямі трансляції</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --primary: #ff2d55;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #111111;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 100;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                height: 100%;
                transform: translateX(-100%);
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }
        
        .logo {
            padding: 20px;
            font-size: 26px;
            font-weight: 700;
            color: var(--primary);
            border-bottom: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-item {
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ccc;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .nav-item:hover, .nav-item.active {
            background: #1f1f1f;
            color: white;
        }
        
        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .top-bar {
            height: 60px;
            background: rgba(10,10,10,0.95);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            z-index: 50;
        }
        
        .player-area {
            flex: 1;
            background: #000;
            position: relative;
            min-height: 300px;
        }
        
        .player {
            width: 100%;
            height: 100%;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .slides {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a, #000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #aaa;
        }
        
        .slides h1 {
            font-size: 38px;
            color: var(--primary);
        }
        
        /* Match Info */
        .match-info {
            padding: 14px 20px;
            background: #111;
            font-size: 18px;
            font-weight: 600;
            border-top: 1px solid #222;
            display: none;
        }
        
        /* Match Bar */
        .match-bar {
            background: #111;
            padding: 12px 10px;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: #ff2d55 #222;
        }
        
        .match-card {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            min-width: 170px;
            padding: 10px 14px;
            background: #1a1a1a;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .match-card.active {
            border-color: var(--primary);
            background: #222;
        }
        
        .match-card:hover {
            transform: scale(1.04);
        }
        
        .league {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }
        
        .teams {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        
        .team {
            flex: 1;
            text-align: center;
        }
        
        .team-logo {
            font-size: 32px;
            margin-bottom: 4px;
        }
        
        .team-name {
            font-size: 14px;
            font-weight: 600;
        }
        
        .vs-time {
            font-size: 15px;
            font-weight: 700;
            color: var(--primary);
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fas fa-futbol"></i>
                KASTA SPORTS
            </div>
            
            <div class="nav-item active"><i class="fas fa-tv"></i><span>Прямі трансляції</span></div>
            <div class="nav-item"><i class="fas fa-futbol"></i><span>Футбол</span></div>
            <div class="nav-item"><i class="fas fa-basketball-ball"></i><span>Баскетбол</span></div>
            <div class="nav-item"><i class="fas fa-hockey-puck"></i><span>Хокей</span></div>
            <div class="nav-item"><i class="fas fa-tennis-ball"></i><span>Теніс</span></div>
        </div>
        
        <!-- Main Content -->
        <div class="main">
            <div class="top-bar">
                <button onclick="toggleSidebar()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;">
                    <i class="fas fa-bars"></i>
                </button>
                <div style="font-size:22px; font-weight:700; color:var(--primary);">ПРЯМІ ТРАНСЛЯЦІЇ</div>
                <div></div>
            </div>
            
            <!-- Player -->
            <div class="player-area">
                <div class="player" id="player">
                    <div class="slides" id="slides">
                        <h1>ГОЛОВНІ МАТЧІ ДНЯ</h1>
                        <p style="margin-top: 30px; font-size: 18px;">Оберіть трансляцію нижче</p>
                    </div>
                </div>
            </div>
            
            <!-- Match Info -->
            <div class="match-info" id="matchInfo"></div>
            
            <!-- Scrollable Match Bar -->
            <div class="match-bar" id="matchBar"></div>
        </div>
    </div>

    <script>
        const matches = [
            {
                id: 1,
                league: "УПЛ • 19:30",
                team1: "Динамо К",
                logo1: "💙",
                team2: "Шахтар",
                logo2: "🟡",
                url: "", // ← Встав сюди свій embed URL
                title: "Динамо Київ — Шахтар Донецьк"
            },
            {
                id: 2,
                league: "АПЛ • 22:00",
                team1: "Арсенал",
                logo1: "🔴",
                team2: "Ліверпуль",
                logo2: "🔴",
                url: "https://www.youtube.com/embed/dQw4w9wgxcq", 
                title: "Арсенал — Ліверпуль"
            },
            {
                id: 3,
                league: "Ліга Чемпіонів • 21:00",
                team1: "Реал",
                logo1: "⚪",
                team2: "Баварія",
                logo2: "🔴",
                url: "",
                title: "Реал Мадрид — Баварія"
            },
            {
                id: 4,
                league: "NBA • 02:30",
                team1: "Лейкерс",
                logo1: "🟡",
                team2: "Селтікс",
                logo2: "🟢",
                url: "",
                title: "Лос-Анджелес Лейкерс — Бостон Селтікс"
            },
            {
                id: 5,
                league: "Серія A • 20:45",
                team1: "Ювентус",
                logo1: "⚫",
                team2: "Мілан",
                logo2: "🔴",
                url: "",
                title: "Ювентус — Мілан"
            }
        ];
        
        let currentMatch = null;
        
        function renderMatches() {
            const bar = document.getElementById('matchBar');
            bar.innerHTML = '';
            
            matches.forEach(match => {
                const card = document.createElement('div');
                card.className = `match-card ${currentMatch && currentMatch.id === match.id ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="league">${match.league}</div>
                    <div class="teams">
                        <div class="team">
                            <div class="team-logo">${match.logo1}</div>
                            <div class="team-name">${match.team1}</div>
                        </div>
                        <div class="vs-time">VS</div>
                        <div class="team">
                            <div class="team-logo">${match.logo2}</div>
                            <div class="team-name">${match.team2}</div>
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => playMatch(match));
                bar.appendChild(card);
            });
        }
        
        function playMatch(match) {
            currentMatch = match;
            
            const slides = document.getElementById('slides');
            const playerDiv = document.getElementById('player');
            const infoDiv = document.getElementById('matchInfo');
            
            slides.style.display = 'none';
            
            if (match.url && match.url.trim() !== '') {
                playerDiv.innerHTML = `<iframe src="${match.url}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
            } else {
                playerDiv.innerHTML = `
                    <div style="height:100%; display:flex; align-items:center; justify-content:center; flex-direction:column; color:#555;">
                        <i class="fas fa-tv" style="font-size:90px; margin-bottom:20px; opacity:0.3;"></i>
                        <h2>Трансляція буде тут</h2>
                        <p>Вставте embed-посилання в масив matches</p>
                    </div>`;
            }
            
            infoDiv.textContent = match.title;
            infoDiv.style.display = 'block';
            
            renderMatches();
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        
        // Закриття меню при кліку поза ним
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            if (window.innerWidth <= 768 && 
                sidebar.classList.contains('open') && 
                !sidebar.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });
        
        window.onload = () => {
            renderMatches();
            
            // Автозапуск першого матчу
            setTimeout(() => {
                if (matches.length > 0) playMatch(matches[0]);
            }, 800);
        };
    </script>
</body>
</html>
