<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Football MultiPlayer</title>

<script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
}

#megaPlayer{
  position:relative;
  width:90vw;
  max-width:1280px;
  aspect-ratio:16/9;
  margin:auto;
  top:50%;
  transform:translateY(-50%);
  overflow:hidden;
  background:#000;
}

.player-box{
  position:absolute;
  top:0;
  width:50%;
  height:100%;
  transition:all .35s ease;
  overflow:hidden;
  background:#000;
}

#box1{
  left:0;
}

#box2{
  left:50%;
}

.player-inner{
  width:100%;
  height:100%;
}

.fullscreen-btn{
  position:absolute;
  top:10px;
  right:10px;
  z-index:99999;

  border:none;
  border-radius:6px;

  background:rgba(0,0,0,.6);
  color:#fff;

  padding:8px 12px;
  cursor:pointer;
}

.focused{
  width:100% !important;
  height:100% !important;
  left:0 !important;
  top:0 !important;
  z-index:1;
}

.miniplayer{
  width:25% !important;
  height:25% !important;

  right:15px !important;
  left:auto !important;
  top:auto !important;
  bottom:15px !important;

  z-index:9999;

  border:2px solid rgba(255,255,255,.25);
  border-radius:8px;

  overflow:hidden;
  cursor:pointer;
}

.media-control,
.seekbar,
.bar-container,
.progress-bar-container{
  display:none !important;
}
</style>
</head>

<body>

<div id="megaPlayer">

<button id="fullscreenBtn" class="fullscreen-btn">
Повноекранний
</button>

<div class="player-box" id="box1">
  <div id="player1" class="player-inner"></div>
</div>

<div class="player-box" id="box2">
  <div id="player2" class="player-inner"></div>
</div>

</div>

<script>

const streams = [
  "https://ext.cdn.nashnet.tv/228.0.2.45/index.m3u8",
  "https://ext.cdn.nashnet.tv/228.0.0.41/index.m3u8"
];

const players = [];

let focusMode = false;
let bigPlayer = 0;

function createPlayers(){

  players[0] = new Clappr.Player({
    source: streams[0],
    parentId:"#player1",
    autoPlay:true,
    mute:true,
    width:"100%",
    height:"100%",
    fullscreenEnabled:false
  });

  players[1] = new Clappr.Player({
    source: streams[1],
    parentId:"#player2",
    autoPlay:true,
    mute:true,
    width:"100%",
    height:"100%",
    fullscreenEnabled:false
  });

}

function setFocus(index){

  if(!focusMode){

    focusMode = true;
    bigPlayer = index;

  }else{

    bigPlayer = index;

  }

  const small = index === 0 ? 1 : 0;

  const bigBox =
    document.getElementById(
      "box"+(index+1)
    );

  const smallBox =
    document.getElementById(
      "box"+(small+1)
    );

  document
    .querySelectorAll(".player-box")
    .forEach(el=>{

      el.classList.remove(
        "focused",
        "miniplayer"
      );

    });

  bigBox.classList.add("focused");
  smallBox.classList.add("miniplayer");

  players.forEach(p=>p.setMute(true));
  players[index].setMute(false);

}

function restoreLayout(){

  focusMode = false;

  document
    .querySelectorAll(".player-box")
    .forEach(el=>{

      el.classList.remove(
        "focused",
        "miniplayer"
      );

    });

  document.getElementById("box1").style.left="0";
  document.getElementById("box2").style.left="50%";

  players.forEach(
    p=>p.setMute(true)
  );

}

document
.getElementById("box1")
.addEventListener("dblclick",()=>{

  if(
    focusMode &&
    bigPlayer===0
  ){

    restoreLayout();

  }else{

    setFocus(0);

  }

});

document
.getElementById("box2")
.addEventListener("dblclick",()=>{

  if(
    focusMode &&
    bigPlayer===1
  ){

    restoreLayout();

  }else{

    setFocus(1);

  }

});

document
.getElementById("box1")
.addEventListener("click",()=>{

  if(
    focusMode &&
    bigPlayer!==0
  ){

    setFocus(0);

  }

});

document
.getElementById("box2")
.addEventListener("click",()=>{

  if(
    focusMode &&
    bigPlayer!==1
  ){

    setFocus(1);

  }

});

fullscreenBtn.onclick = ()=>{

  const el =
    document.getElementById(
      "megaPlayer"
    );

  if(!document.fullscreenElement){

    el.requestFullscreen();

  }else{

    document.exitFullscreen();

  }

};

document.addEventListener(
  "fullscreenchange",
  ()=>{

    if(document.fullscreenElement){

      screen.orientation
      ?.lock?.("landscape")
      .catch(()=>{});

    }

  }
);

createPlayers();

</script>

</body>
</html>
