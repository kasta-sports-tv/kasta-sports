<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>2x1 Плеєр</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mega-player {
      position: relative;
      width: 90vw;
      max-width: 1280px;
      aspect-ratio: 16 / 9;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
      gap: 2px;
      overflow: hidden;
      background-image: url('https://images.football.ua/i/news/630x373/543/543777.png');
      background-size: cover;
      background-position: center;
    }

    .player-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: transparent;
    }

    .inner-player {
      width: 100%;
      height: 60%;
    }

    @media (min-width: 768px) {
      .inner-player {
        height: 50%;
      }

      .watermark {
        font-size: 1.2rem;
      }
    }

    .watermark {
      color: white;
      margin-top: 6px;
      font-size: 0.9rem;
      text-shadow: 0 0 5px black;
      text-align: center;
    }

    .fullscreen-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 999;
      background: rgba(0, 0, 0, 0.4);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    .clappr-player {
      background: transparent !important;
    }

    video {
      object-fit: contain !important;
      background-color: transparent !important;
    }
  </style>
</head>
<body>
  <div class="mega-player" id="megaPlayer">
    <button class="fullscreen-btn" id="fullscreenBtn">Повноекранний</button>
    
    <div class="player-box">
      <div class="inner-player" id="player1"></div>
      <div class="watermark" id="label1">Фінляндія vs Україна</div>
    </div>
    
    <div class="player-box">
      <div class="inner-player" id="player2"></div>
      <div class="watermark" id="label2">Команда B</div>
    </div>
  </div>

  <script>
    const streams = [
      "https://ext.cdn.nashnet.tv/228.0.2.45/index.m3u8",
      "https://ext.cdn.nashnet.tv/228.0.0.41/index.m3u8"
    ];

    const players = [];
    let isFullscreen = false;
    let selectedIndex = null;
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    function createPlayers() {
      streams.forEach((src, index) => {
        const id = `#player${index + 1}`;
        const player = new Clappr.Player({
          source: src,
          parentId: id,
          autoPlay: true,
          mute: true,
          width: '100%',
          height: '100%',
          fullscreenEnabled: false,
        });

        players[index] = player;

        document.querySelector(id).addEventListener('click', () => {
          if (!isFullscreen) return;
          players.forEach(p => p.setMute(true));
          player.setMute(false);
        });

        document.querySelector(id).addEventListener('dblclick', () => {
          if (!isFullscreen) return;
          selectPlayer(index);
        });
      });
    }

    function destroyPlayers() {
      players.forEach(p => p.destroy());
      players.length = 0;
    }

    function selectPlayer(index) {
      selectedIndex = index;
      destroyPlayers();

      const id = `#player${index + 1}`;
      const player = new Clappr.Player({
        source: streams[index],
        parentId: id,
        autoPlay: true,
        mute: false,
        width: '100%',
        height: '100%',
      });

      players[index] = player;

      document.querySelector(id).addEventListener('dblclick', () => {
        destroyPlayers();
        createPlayers();
        selectedIndex = null;
      });
    }

    fullscreenBtn.addEventListener("click", () => {
      const container = document.getElementById("megaPlayer");
      if (!document.fullscreenElement) {
        if (container.requestFullscreen) container.requestFullscreen();
        else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
        else if (container.msRequestFullscreen) container.msRequestFullscreen();
      } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.msExitFullscreen) document.msExitFullscreen();
      }
    });

    document.addEventListener('fullscreenchange', () => {
      isFullscreen = !!document.fullscreenElement;
      fullscreenBtn.textContent = isFullscreen ? 'Повернутися' : 'Повноекранний';
      if (isFullscreen) {
        screen.orientation?.lock?.('landscape').catch(() => {});
      }
    });

    createPlayers();
  </script>
</body>
</html>
