<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>2x1 Плеєр</title>

  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mega-player {
      position: relative;
      width: 90vw;
      max-width: 1280px;
      aspect-ratio: 16 / 9;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      overflow: hidden;
      background-image: url('https://images.football.ua/i/news/630x373/543/543777.png');
      background-size: cover;
      background-position: center;
    }

    .player-box {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: transparent;
      transition: all .3s ease;
    }

    .inner-player {
      width: 100%;
      height: 60%;
    }

    .watermark {
      color: white;
      margin-top: 6px;
      font-size: 0.9rem;
      text-shadow: 0 0 5px black;
      text-align: center;
      pointer-events: none;
    }

    .fullscreen-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 999;
      background: rgba(0, 0, 0, 0.4);
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
    }

    video {
      object-fit: contain !important;
      background-color: transparent !important;
    }

    /* 🔴 СХОВАТИ ТІЛЬКИ ПОЛОСКУ ПРОГРЕСУ */
    .media-control .bar-container,
    .media-control .seekbar,
    .media-control .progress-bar-container {
      display: none !important;
    }

    /* =========================
       FOCUS MODE (BIG PLAYER)
    ========================== */
    .player-box.focused {
      position: absolute !important;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 20;
    }

    .player-box.focused .inner-player {
      height: 100%;
    }

    /* =========================
       PIP MODE (SMALL PLAYER)
    ========================== */
    .player-box.pip {
      position: absolute !important;
      width: 28%;
      height: 28%;
      right: 12px;
      bottom: 12px;
      z-index: 30;

      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 0 12px rgba(0,0,0,0.6);
    }

    .player-box.pip .inner-player {
      height: 100%;
    }

    .player-box.pip .watermark {
      position: absolute;
      left: 6px;
      bottom: 6px;
      font-size: 0.7rem;
      margin: 0;
    }

  </style>
</head>

<body>

<div class="mega-player" id="megaPlayer">

  <button class="fullscreen-btn" id="fullscreenBtn">Повноекранний</button>

  <div class="player-box" id="box1">
    <div class="inner-player" id="player1"></div>
    <div class="watermark">Команда А</div>
  </div>

  <div class="player-box" id="box2">
    <div class="inner-player" id="player2"></div>
    <div class="watermark">Команда B</div>
  </div>

</div>

<script>

const streams = [
  "https://ext.cdn.nashnet.tv/228.0.2.45/index.m3u8",
  "https://ext.cdn.nashnet.tv/228.0.0.41/index.m3u8"
];

const players = [];

let isFullscreen = false;
let focusIndex = null;

const box1 = document.getElementById("box1");
const box2 = document.getElementById("box2");
const boxes = [box1, box2];

function createPlayers() {

  streams.forEach((src, index) => {

    players[index] = new Clappr.Player({
      source: src,
      parentId: "#player" + (index + 1),
      autoPlay: true,
      mute: true,
      width: "100%",
      height: "100%",
      fullscreenEnabled: false
    });

    const el = document.getElementById("player" + (index + 1));

    el.addEventListener("dblclick", () => {
      if (!isFullscreen) return;

      if (focusIndex === index) {
        restoreLayout();
      } else {
        setFocus(index);
      }
    });

  });

}

/* =========================
   FOCUS MODE
========================== */

function setFocus(index) {

  focusIndex = index;
  const other = index === 0 ? 1 : 0;

  boxes.forEach(b => {
    b.classList.remove("focused", "pip");
  });

  boxes[index].classList.add("focused");
  boxes[other].classList.add("pip");

  players.forEach(p => p.setMute(true));
  players[index].setMute(false);

  attachSwapHandler(other, index);
}

/* swap when clicking small player */
function attachSwapHandler(smallIndex, bigIndex) {

  boxes[smallIndex].onclick = () => {
    setFocus(smallIndex);
  };

}

/* restore 50/50 */
function restoreLayout() {

  focusIndex = null;

  boxes.forEach(b => {
    b.classList.remove("focused", "pip");
    b.onclick = null;
  });

  players.forEach(p => p.setMute(true));
}

/* =========================
   FULLSCREEN
========================== */

document.getElementById("fullscreenBtn").addEventListener("click", () => {

  const el = document.getElementById("megaPlayer");

  if (!document.fullscreenElement) {
    el.requestFullscreen?.();
  } else {
    document.exitFullscreen?.();
  }

});

document.addEventListener("fullscreenchange", () => {
  isFullscreen = !!document.fullscreenElement;
});

/* старт */
createPlayers();

</script>

</body>
</html>
