<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2x1 Плеєр</title>

<script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  height:100%;
  width:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
}

.mega-player{
  position:relative;
  width:90vw;
  max-width:1280px;
  aspect-ratio:16/9;

  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2px;

  overflow:hidden;

  background-image:url('https://images.football.ua/i/news/630x373/543/543777.png');
  background-size:cover;
  background-position:center;
}

.player-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  background:transparent;
  transition:all .3s ease;
}

.inner-player{
  width:100%;
  height:60%;
}

.watermark{
  color:#fff;
  margin-top:6px;
  font-size:.9rem;
  text-shadow:0 0 5px #000;
  text-align:center;
  z-index:50;
}

.fullscreen-btn{
  position:absolute;
  top:10px;
  right:10px;
  z-index:999;

  background:rgba(0,0,0,.4);
  color:#fff;

  border:none;
  padding:8px 12px;
  border-radius:4px;
  cursor:pointer;
}

.clappr-player{
  background:transparent!important;
}

video{
  object-fit:contain!important;
  background-color:transparent!important;
}

/* Прибираємо тільки полоску прогресу */

.seekbar,
.bar-container,
.progress-bar-container{
  display:none!important;
}

/* Великий режим */

.player-box.focused{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:5;
}

.player-box.focused .inner-player{
  height:100%;
}

.player-box.focused .watermark{
  position:absolute;
  left:10px;
  bottom:10px;
  margin:0;
}

/* Маленький плеєр */

.player-box.pip{
  position:absolute;
  width:28%;
  height:28%;

  right:10px;
  bottom:10px;

  z-index:10;

  border:2px solid rgba(255,255,255,.25);
  border-radius:8px;

  overflow:hidden;
  cursor:pointer;

  background:#000;
}

.player-box.pip .inner-player{
  height:100%;
}

.player-box.pip .watermark{
  position:absolute;
  left:6px;
  bottom:6px;
  margin:0;
  font-size:.75rem;
}

@media (min-width:768px){

  .inner-player{
    height:50%;
  }

  .watermark{
    font-size:1.2rem;
  }

}
</style>
</head>

<body>

<div class="mega-player" id="megaPlayer">

<button class="fullscreen-btn" id="fullscreenBtn">
Повноекранний
</button>

<div class="player-box" id="box1">
  <div class="inner-player" id="player1"></div>
  <div class="watermark" id="label1">
    Команда А
  </div>
</div>

<div class="player-box" id="box2">
  <div class="inner-player" id="player2"></div>
  <div class="watermark" id="label2">
    Команда B
  </div>
</div>

</div>

<script>

const streams = [
  "https://ext.cdn.nashnet.tv/228.0.2.45/index.m3u8",
  "https://ext.cdn.nashnet.tv/228.0.0.41/index.m3u8"
];

const players = [];

let isFullscreen = false;
let selectedIndex = null;

const fullscreenBtn =
document.getElementById("fullscreenBtn");

const boxes = [
  document.getElementById("box1"),
  document.getElementById("box2")
];

function createPlayers(){

  streams.forEach((src,index)=>{

    players[index] = new Clappr.Player({
      source:src,
      parentId:"#player"+(index+1),

      autoPlay:true,
      mute:true,

      width:"100%",
      height:"100%",

      fullscreenEnabled:true
    });

    document
    .getElementById("player"+(index+1))
    .addEventListener("dblclick",()=>{

      if(!isFullscreen) return;

      if(selectedIndex===index){

        restoreView();

      }else{

        focusPlayer(index);

      }

    });

  });

}

function focusPlayer(index){

  selectedIndex = index;

  const other =
    index===0 ? 1 : 0;

  boxes.forEach(box=>{

    box.classList.remove("focused");
    box.classList.remove("pip");

  });

  boxes[index]
    .classList.add("focused");

  boxes[other]
    .classList.add("pip");

  players.forEach(
    p=>p.setMute(true)
  );

  players[index].setMute(false);

}

function restoreView(){

  selectedIndex = null;

  boxes.forEach(box=>{

    box.classList.remove("focused");
    box.classList.remove("pip");

  });

  players.forEach(
    p=>p.setMute(true)
  );

}

boxes.forEach((box,index)=>{

  box.addEventListener("click",()=>{

    if(selectedIndex===null)
      return;

    if(box.classList.contains("pip")){

      focusPlayer(index);

    }

  });

});

fullscreenBtn.addEventListener("click",()=>{

  const container =
    document.getElementById(
      "megaPlayer"
    );

  if(!document.fullscreenElement){

    container.requestFullscreen?.();

  }else{

    document.exitFullscreen?.();

  }

});

document.addEventListener(
  "fullscreenchange",
  ()=>{

    isFullscreen =
      !!document.fullscreenElement;

    fullscreenBtn.textContent =
      isFullscreen
      ? "Повернутися"
      : "Повноекранний";

    if(isFullscreen){

      screen.orientation
      ?.lock?.("landscape")
      .catch(()=>{});

    }

  }
);

createPlayers();

</script>

</body>
</html>
