<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>2x1 Спортивний Мультиплєєр</title>
  <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100%;
      width: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* Головний контейнер (завжди 16:9 з твоїм фоном) */
    .mega-player {
      position: relative;
      width: 100vw;
      max-width: 100%;
      aspect-ratio: 16 / 9;
      background-image: url('https://images.football.ua/i/news/630x373/543/543777.png');
      background-size: cover;
      background-position: center;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* РЕЖИМ 1: Початковий 50/50 (Плеєри поруч, всередині фону, не обрізані) */
    .mega-player.split-mode {
      display: flex;
      flex-direction: row;
      gap: 20px;
      padding: 20px;
      justify-content: center;
      align-items: center;
    }

    /* На мобільних пристроях у режимі 50/50 плеєри стають один над одним, щоб зберігати 16:9 і не бути мікроскопічними */
    @media (max-width: 767px) {
      .mega-player.split-mode {
        flex-direction: column;
        gap: 10px;
        padding: 10px;
      }
    }

    /* Контейнер для плеєра та його підпису */
    .player-box {
      position: relative;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Стилі боксів для режиму 50/50 */
    .mega-player.split-mode .player-box {
      width: 46%; /* Залишає місце для фону навколо */
      aspect-ratio: 16 / 9;
    }
    @media (max-width: 767px) {
      .mega-player.split-mode .player-box {
        width: 70%; /* Для мобілок */
      }
    }

    /* РЕЖИМ 2: Картинка в картинці (Фулскрін / PiP) */
    .mega-player.pip-mode .player-box.main-player {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .mega-player.pip-mode .player-box.pip-player {
      position: absolute;
      bottom: 15px;
      right: 15px;
      width: 25%; /* Малий плеєр займає 25% ширини */
      aspect-ratio: 16 / 9;
      z-index: 10;
      box-shadow: 0 0 15px rgba(0,0,0,0.8);
      border: 2px solid rgba(255, 255, 255, 0.5);
      cursor: pointer;
    }
    .mega-player.pip-mode .player-box.pip-player:hover {
      border-color: #fff;
    }

    /* Контейнер самого відео */
    .inner-player {
      width: 100%;
      height: 100%;
      background: #000;
    }

    /* Водяний знак / Назви команд */
    .watermark {
      color: white;
      font-size: 1rem;
      font-weight: bold;
      text-shadow: 0 0 4px black;
      margin-top: 6px;
      text-align: center;
      transition: all 0.2s;
    }

    /* Ховаємо підписи під відео у режимі PiP, щоб не заважали, або робимо маленькими */
    .mega-player.pip-mode .main-player .watermark {
      position: absolute;
      bottom: 10px;
      left: 10px;
      margin: 0;
      background: rgba(0,0,0,0.6);
      padding: 3px 8px;
      border-radius: 4px;
      z-index: 5;
    }
    .mega-player.pip-mode .pip-player .watermark {
      display: none; /* Ховаємо назву на маленькому екрані */
    }

    /* Верхня панель кнопок */
    .controls-panel {
      position: absolute;
      top: 15px;
      right: 15px;
      z-index: 100;
      display: flex;
      gap: 10px;
    }

    .btn {
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: bold;
      transition: background 0.2s;
    }
    .btn:hover {
      background: rgba(0, 0, 0, 0.9);
      border-color: #fff;
    }

    /* Корекція відображення Clappr */
    .clappr-player {
      background: transparent !important;
    }
    video {
      object-fit: contain !important; /* Гарантує, що відео ніколи не обріжеться */
    }
  </style>
</head>
<body>

  <div class="mega-player split-mode" id="megaPlayer">
    
    <div class="controls-panel">
      <button class="btn" id="fullscreenBtn">Повний екран (PiP)</button>
    </div>
    
    <div class="player-box main-player" id="box1">
      <div class="inner-player" id="player1"></div>
      <div class="watermark">Команда А</div>
    </div>
    
    <div class="player-box pip-player" id="box2">
      <div class="inner-player" id="player2"></div>
      <div class="watermark">Команда B</div>
    </div>

  </div>

  <script>
    const streams = [
      "https://bitcdn-kronehit.bitmovin.com/v2/hls/chunklist.m3u8",
      "https://nl1.nghk.ai/AS1HRHD/index.m3u8"
    ];

    const players = [];
    const megaPlayer = document.getElementById("megaPlayer");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    
    const box1 = document.getElementById("box1");
    const box2 = document.getElementById("box2");

    // Ініціалізація плеєрів
    function initPlayers() {
      streams.forEach((src, index) => {
        const id = `#player${index + 1}`;
        players[index] = new Clappr.Player({
          source: src,
          parentId: id,
          autoPlay: true,
          mute: false, // Обидва зі звуком у режимі 50/50 (або налаштуй як треба)
          width: '100%',
          height: '100%',
          fullscreenEnabled: false,
          chromeless: true
        });
      });
    }

    // Керування звуком залежно від поточного стану вікон
    function updateMuteState() {
      if (megaPlayer.classList.contains('split-mode')) {
        // У режимі 50/50 грають обидва потоки (можна увімкнути обидва або заглушити другий)
        players[0].setMute(false);
        players[1].setMute(false);
      } else {
        // В режимі фулскріну (PiP) звук є ТІЛЬКИ у великого плеєра
        if (box1.classList.contains('main-player')) {
          players[0].setMute(false);
          players[1].setMute(true);
        } else {
          players[0].setMute(true);
          players[1].setMute(false);
        }
      }
    }

    // Перемикання режимів: 50/50 <-> Повний екран (PiP)
    function toggleFullscreenMode(goFullscreen) {
      if (goFullscreen) {
        megaPlayer.classList.remove('split-mode');
        megaPlayer.classList.add('pip-mode');
      } else {
        megaPlayer.classList.remove('pip-mode');
        megaPlayer.classList.add('split-mode');
        // Скидаємо класи до стандартних для режиму 50/50
        box1.className = "player-box main-player";
        box2.className = "player-box pip-player";
      }
      updateMuteState();
    }

    // Функція міксування/свапу вікон (клік по малому плеєру)
    function handlePipClick(e) {
      // Працює виключно в режимі фулскріну (PiP)
      if (!megaPlayer.classList.contains('pip-mode')) return;
      
      const clickedBox = e.currentTarget;
      if (clickedBox.classList.contains('main-player')) return; // Якщо великий — ігноруємо

      // Міняємо ролі місцями
      if (box1.classList.contains('main-player')) {
        box1.className = "player-box pip-player";
        box2.className = "player-box main-player";
      } else {
        box1.className = "player-box main-player";
        box2.className = "player-box pip-player";
      }

      updateMuteState();
    }

    // Вішаємо події
    box1.addEventListener('click', handlePipClick);
    box2.addEventListener('click', handlePipClick);

    // Логіка кнопки "Повний екран"
    fullscreenBtn.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        if (megaPlayer.requestFullscreen) {
          megaPlayer.requestFullscreen();
        } else if (megaPlayer.webkitRequestFullscreen) {
          megaPlayer.webkitRequestFullscreen();
        }
        toggleFullscreenMode(true); // Вмикаємо PiP режим всередині фулскріну
      } else {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        }
      }
    });

    // Відстежуємо системний вихід з фулскріну (наприклад, кнопкою Esc)
    document.addEventListener('fullscreenchange', () => {
      const isFs = !!document.fullscreenElement;
      fullscreenBtn.textContent = isFs ? 'Повернутись у 50/50' : 'Повний екран (PiP)';
      
      if (!isFs) {
        // Якщо користувач вийшов з повного екрана — повертаємо режим 50/50 з твоїм фоном
        toggleFullscreenMode(false);
      }
    });

    // Старт плеєрів
    initPlayers();
    setTimeout(updateMuteState, 1000);
  </script>
</body>
</html>
