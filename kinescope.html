<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.player{
    width:100%;
    max-width:1000px;
    aspect-ratio:16/9;
    background:#000;
}

video{
    width:100%;
    height:100%;
    background:#000;
}
</style>
</head>
<body>

<div class="player">
    <video id="video" controls playsinline></video>
</div>

<script>

const stream = "ВСТАВ_ТУТ_СВОЄ_M3U8_ПОСИЛАННЯ";

const video = document.getElementById("video");

if (Hls.isSupported()) {

    const hls = new Hls();

    hls.loadSource(stream);

    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.play().catch(()=>{});
    });

} else if (video.canPlayType('application/vnd.apple.mpegurl')) {

    video.src = stream;

}

</script>

</body>
</html>
