<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>

html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
}

/* ===== PLAYER WRAPPER ===== */
#player-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    aspect-ratio: 16 / 9;
    background: #000;
}

/* ===== PLAYER ===== */
#player {
    position: absolute;
    inset: 0;
}

/* iframe player */
#player iframe,
#player video {
    width: 100%;
    height: 100%;
}

/* ===== IMPORTANT FIX: TAP LAYER ===== */
#tapLayer {
    position: absolute;
    inset: 0;
    z-index: 15000;
    background: transparent;
}

/* ===== MENU ===== */
#liveMenu {
    position: absolute;
    left: 12px;
    top: 40%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 20000;

    opacity: 0;
    pointer-events: none;
    transition: .25s ease;
}

#liveMenu.show {
    opacity: 1;
    pointer-events: auto;
}

.live-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    font-family: Arial;
    font-size: 14px;
    cursor: pointer;
}

.live-btn.active {
    border-color: red;
    color: red;
}

</style>
</head>

<body>

<div id="player-wrapper">

    <div id="player"></div>

    <!-- 🔥 TAP CAPTURE LAYER -->
    <div id="tapLayer"></div>

    <div id="liveMenu"></div>

</div>

<script>

const streams = [
    {
        name: "Stream 1",
        url: "https://sportkastv.blogspot.com/2026/06/html-body-margin-0-padding-0-width-100_0753842376.html"
    },
    {
        name: "Stream 2",
        url: "https://sportkastv.blogspot.com/2026/06/2-vs.html"
    },
    {
        name: "Stream 3",
        url: "https://sportkastv.blogspot.com/2026/06/2-vs.html"
    }
];

let current = 0;
const menu = document.getElementById("liveMenu");
const tapLayer = document.getElementById("tapLayer");

let hideTimer = null;

/* ===== LOAD STREAM ===== */
function loadStream(i) {
    current = i;

    document.getElementById("player").innerHTML = "";

    new Playerjs({
        id: "player",
        file: streams[i].url,
        autoplay: 0,
        lang: "en"
    });

    updateActive();
}

/* ===== MENU ===== */
function buildMenu() {
    streams.forEach((s, i) => {

        const btn = document.createElement("div");
        btn.className = "live-btn";
        btn.textContent = s.name;

        btn.onclick = (e) => {
            e.stopPropagation();
            loadStream(i);
            showMenu();
        };

        menu.appendChild(btn);
    });

    updateActive();
}

/* ===== ACTIVE ===== */
function updateActive() {
    document.querySelectorAll(".live-btn").forEach((b, i) => {
        b.classList.toggle("active", i === current);
    });
}

/* ===== SHOW/HIDE ===== */
function showMenu() {
    menu.classList.add("show");

    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
        menu.classList.remove("show");
    }, 3000);
}

/* ===== FIXED TAP SYSTEM ===== */
tapLayer.addEventListener("click", () => {
    if (menu.classList.contains("show")) {
        menu.classList.remove("show");
        clearTimeout(hideTimer);
    } else {
        showMenu();
    }
});

/* ===== INIT ===== */
buildMenu();
loadStream(0);

</script>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

</body>
</html>
