<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>

html, body {
    margin: 0;
    padding: 0;
    background: #000;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

/* ===== PLAYER ===== */
#player-wrapper {
    position: absolute;
    inset: 0;
    background: #000;
}

#player {
    position: absolute;
    inset: 0;
}

#player iframe {
    width: 100%;
    height: 100%;
    border: 0;
}

/* ===== MENU ===== */
#liveMenu {
    position: absolute;
    left: 12px;
    top: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;

    z-index: 999999999;

    opacity: 1; /* 🔥 ВАЖЛИВО: НЕ ховаємо для тесту */
    pointer-events: auto;
}

/* ===== BUTTON ===== */
.live-btn {
    display: flex;
    align-items: center;
    gap: 8px;

    padding: 10px 12px;
    border-radius: 10px;

    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;

    font-family: Arial;
    font-size: 14px;
    cursor: pointer;
}

.live-btn img {
    width: 18px;
    height: 12px;
}

.live-btn.active {
    border-color: red;
    color: red;
}

</style>
</head>

<body>

<div id="player-wrapper">
    <div id="player"></div>
    <div id="liveMenu"></div>
</div>

<script>

const streams = [
    {
        name: "Stream 1",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Flag_of_Ukraine.png/330px-Flag_of_Ukraine.png",
        url: "https://sportkastv.blogspot.com/2026/06/html-body-margin-0-padding-0-width-100_0753842376.html"
    },
    {
        name: "Stream 2",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg/330px-Flag_of_the_United_Kingdom_%283-5%29.svg.png",
        url: "https://sportkastv.blogspot.com/2026/06/2-vs.html"
    },
    {
        name: "Stream 3",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Flag_of_Germany.svg/330px-Flag_of_Germany.svg.png",
        url: "https://kasta-sports.vercel.app/wc-player.html"
    }
];

let current = 0;

const player = document.getElementById("player");
const menu = document.getElementById("liveMenu");

/* ===== PLAYER LOAD ===== */
function loadStream(i) {
    current = i;

    player.innerHTML = "";

    const iframe = document.createElement("iframe");
    iframe.src = streams[i].url;
    iframe.allow = "autoplay; fullscreen";
    iframe.allowFullscreen = true;

    player.appendChild(iframe);

    updateActive();
}

/* ===== MENU BUILD (ФІКС ГАРАНТІЯ) ===== */
function buildMenu() {

    console.log("MENU BUILD OK"); // 🔥 debug

    streams.forEach((s, i) => {

        const btn = document.createElement("div");
        btn.className = "live-btn";

        const img = document.createElement("img");
        img.src = s.flag;

        const text = document.createElement("span");
        text.textContent = s.name;

        btn.appendChild(img);
        btn.appendChild(text);

        btn.onclick = () => {
            console.log("CLICK STREAM", i); // debug
            loadStream(i);
        };

        menu.appendChild(btn);
    });

    updateActive();
}

/* ===== ACTIVE ===== */
function updateActive() {
    document.querySelectorAll(".live-btn").forEach((b, i) => {
        b.classList.toggle("active", i === current);
    });
}

/* ===== INIT (ВАЖЛИВО) ===== */
window.addEventListener("load", () => {
    buildMenu();
    loadStream(0);
});

</script>

</body>
</html>
