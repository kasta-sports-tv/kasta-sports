<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

html,body{
    margin:0;
    padding:0;
    background:#000;
    height:100%;
    overflow:hidden;
}

/* PLAYER */
#player-wrapper{
    position:absolute;
    inset:0;
}

#player{
    position:absolute;
    inset:0;
}

#player iframe{
    width:100%;
    height:100%;
    border:0;
}

/* MENU */
#liveMenu{
    position:absolute;
    left:12px;
    top:40%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:10px;

    z-index:999999;
}

.live-btn{
    display:flex;
    align-items:center;
    gap:8px;

    padding:10px 12px;
    border-radius:10px;

    background:rgba(0,0,0,0.7);
    border:1px solid rgba(255,255,255,0.3);

    color:#fff;
    font-family:Arial;
    font-size:14px;

    cursor:pointer;
}

.live-btn img{
    width:18px;
    height:12px;
}

.live-btn.active{
    border-color:red;
    color:red;
}

</style>
</head>

<body>

<div id="player-wrapper">
    <div id="player"></div>
    <div id="liveMenu"></div>
</div>

<script>

const streams=[
{
 name:"LIVE 1",
 flag:"https://upload.wikimedia.org/wikipedia/commons/d/d2/Flag_of_Ukraine.png",
 url:"https://sportkastv.blogspot.com/2026/06/html-body-margin-0-padding-0-width-100_0753842376.html"
},
{
 name:"LIVE 2",
 flag:"https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg",
 url:"https://sportkastv.blogspot.com/2026/06/2-vs.html"
},
{
 name:"LIVE 3",
 flag:"https://upload.wikimedia.org/wikipedia/commons/9/99/Flag_of_Germany.svg",
 url:"https://kasta-sports.vercel.app/wc-player.html"
}
];

const player=document.getElementById("player");
const menu=document.getElementById("liveMenu");

let current=0;
let timer=null;

/* LOAD PLAYER */
function load(i){
 current=i;
 player.innerHTML="";

 const iframe=document.createElement("iframe");
 iframe.src=streams[i].url;
 iframe.allow="autoplay; fullscreen";
 iframe.allowFullscreen=true;

 player.appendChild(iframe);

 updateActive();
}

/* BUILD MENU */
function buildMenu(){
 console.log("BUILD MENU RUN"); // 🔥 дебаг

 streams.forEach((s,i)=>{
    const btn=document.createElement("div");
    btn.className="live-btn";

    const img=document.createElement("img");
    img.src=s.flag;

    const text=document.createElement("span");
    text.textContent=s.name;

    btn.appendChild(img);
    btn.appendChild(text);

    btn.onclick=()=>{
        load(i);
        showMenu();
    };

    menu.appendChild(btn);
 });

 updateActive();
}

/* ACTIVE */
function updateActive(){
 document.querySelectorAll(".live-btn").forEach((b,i)=>{
    b.classList.toggle("active",i===current);
 });
}

/* SHOW MENU */
function showMenu(){
 console.log("SHOW MENU"); // 🔥 дебаг

 clearTimeout(timer);

 menu.style.display="flex";

 timer=setTimeout(()=>{
    menu.style.display="none";
 },3000);
}

/* TAP FIX */
document.getElementById("player-wrapper")
.addEventListener("click",showMenu,true);

document.getElementById("player-wrapper")
.addEventListener("touchstart",showMenu,true);

/* INIT */
buildMenu();
load(0);

/* 🔥 щоб ти точно бачив що JS живий */
menu.style.display="flex";

</script>

</body>
</html>
