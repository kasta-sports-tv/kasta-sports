<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>

/* ========================= HARD RESET ========================= */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    background: #000;
    overflow: hidden;
}

body {
    position: fixed;
    inset: 0;
}

/* ========================= WRAPPER ========================= */
#player-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    max-width: 100vw;
    aspect-ratio: 16 / 9;
    background: #000;
    overflow: hidden;
}

@supports not (aspect-ratio: 16 / 9) {
    #player-wrapper {
        height: calc(100vw * 9 / 16);
    }
}

/* ========================= PLAYER ========================= */
#player {
    position: absolute;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    background: #000;
}

#player iframe {
    width: 100% !important;
    height: 100% !important;
    border: none !important;
    display: block;
    background: #000;
}

/* ========================= POSTER ========================= */
#myImage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
    z-index: 9999;
    transition: opacity .8s ease;
    pointer-events: none;
}

/* ========================= SPINNER ========================= */
#spinner {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 50px;
    height: 50px;
    margin: -25px 0 0 -25px;
    border: 5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    z-index: 10000;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ========================= LIVE MENU ========================= */
#liveMenu {
    position: absolute;
    left: 12px;
    top: 40%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 20000;

    /* Меню завжди видиме, але кліки крізь нього проходять до плеєра */
    opacity: 0;
    pointer-events: none;
    transition: .25s ease;
}

#liveMenu.show {
    opacity: 1;
    /* Меню видиме, але саме по собі — не клікабельне */
    pointer-events: none;
}

/* Тільки кнопки приймають кліки */
.live-btn {
    display: flex;
    align-items: center;
    gap: 8px;

    padding: 10px 12px;
    border-radius: 10px;

    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;

    font-family: Arial;
    font-size: 14px;

    cursor: pointer;
    pointer-events: auto;
}

.live-btn img {
    width: 18px;
    height: 12px;
    object-fit: cover;
    border-radius: 2px;
}

.live-btn.active {
    border-color: red;
    color: red;
    box-shadow: 0 0 10px rgba(255,0,0,0.6);
}

/* ========================= MOBILE FIX ========================= */
@media (max-width: 768px) {

    #liveMenu {
        gap: 6px;
        left: 10px;
    }

    .live-btn {
        padding: 7px 10px;
        font-size: 12px;
        gap: 6px;
    }
}

/* fullscreen safe */
:fullscreen #liveMenu {
    left: 18px;
}

/* ========================= CLICK OVERLAY ========================= */
#click-overlay {
    position: absolute;
    inset: 0;
    z-index: 15000;
    background: transparent;
    cursor: pointer;

    /* Коли меню відкрите — overlay прибирається щоб iframe був клікабельний */
    pointer-events: auto;
}

#click-overlay.hidden {
    pointer-events: none;
}

</style>
</head>

<body>

<div id="player-wrapper">

    <div id="player"></div>

    <img id="myImage"
         src="https://terrikon.com/i/0/1200/logos/tourns/fifa_world_cup2026.jpg">

    <div id="spinner"></div>

    <div id="liveMenu"></div>

    <div id="click-overlay"></div>

</div>

<script>
const streams = [
    {
        name: "Stream 1",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Flag_of_Ukraine.png/330px-Flag_of_Ukraine.png",
        iframeUrl: "https://sportkastv.blogspot.com/2026/06/html-body-margin-0-padding-0-width-100_0753842376.html"
    },
    {
        name: "Stream 2",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg/330px-Flag_of_the_United_Kingdom_%283-5%29.svg.png",
        iframeUrl: "https://sportkastv.blogspot.com/2026/06/2-vs.html"
    },
    {
        name: "Stream 3",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/b/ba/Flag_of_Germany.svg/330px-Flag_of_Germany.svg.png",
        iframeUrl: "https://sportkastv.blogspot.com/2026/06/multy.html"
    }
];

let current = 0;
const menu = document.getElementById("liveMenu");

function loadStream(i) {
    current = i;

    const playerDiv = document.getElementById("player");
    playerDiv.innerHTML = "";

    const iframe = document.createElement("iframe");
    iframe.src = streams[i].iframeUrl;
    iframe.setAttribute("allowfullscreen", "true");
    iframe.setAttribute("allow", "autoplay; fullscreen");
    iframe.setAttribute("scrolling", "no");
    iframe.setAttribute("frameborder", "0");

    playerDiv.appendChild(iframe);

    updateActive();
}

function buildMenu() {
    menu.innerHTML = "";

    streams.forEach((s, i) => {
        const btn = document.createElement("div");
        btn.className = "live-btn";

        const img = document.createElement("img");
        img.src = s.flag;

        const text = document.createElement("span");
        text.textContent = " " + s.name;

        btn.appendChild(img);
        btn.appendChild(text);

        btn.onclick = (e) => {
            e.stopPropagation();
            loadStream(i);
        };

        menu.appendChild(btn);
    });

    updateActive();
}

function updateActive() {
    document.querySelectorAll(".live-btn").forEach((b, i) => {
        b.classList.toggle("active", i === current);
    });
}

/* menu show/hide */
let hideTimer;
const overlay = document.getElementById("click-overlay");

function showMenu() {
    menu.classList.add("show");
    overlay.classList.add("hidden"); /* прибираємо overlay — плеєр стає клікабельним */

    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
        menu.classList.remove("show");
        overlay.classList.remove("hidden"); /* повертаємо overlay щоб знову ловити кліки */
    }, 3000);
}

overlay.addEventListener("pointerdown", showMenu);

/* INIT */
buildMenu();
loadStream(0);
</script>

<script>
const img = document.getElementById("myImage");
const spinner = document.getElementById("spinner");

setTimeout(() => {
    img.style.opacity = "0";
    spinner.style.opacity = "0";

    setTimeout(() => {
        img.remove();
        spinner.remove();
    }, 800);
}, 3000);
</script>

</body>
</html>
