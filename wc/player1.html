<style>
#player-wrapper{
    position:absolute;
    inset:0;
}

/* iframe */
#player iframe{
    width:100%;
    height:100%;
    border:0;
}

/* ===== MENU OVERLAY ===== */
#liveMenu{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:9999;

    opacity:0;
    transition:0.25s ease;

    pointer-events:none; /* ключ */
}

/* коли видно */
#liveMenu.show{
    opacity:1;
    pointer-events:auto;
}

.live-btn{
    display:flex;
    align-items:center;
    gap:8px;
    padding:10px 12px;
    border-radius:10px;
    background:rgba(0,0,0,0.6);
    color:#fff;
    border:1px solid rgba(255,255,255,0.3);
    cursor:pointer;
}

.live-btn.active{
    border-color:red;
    color:red;
}
</style>

<div id="player-wrapper">
    <div id="player"></div>
    <div id="liveMenu"></div>
</div>

<script>
const streams = [
 {name:"Stream 1", flag:"https://upload.wikimedia.org/wikipedia/commons/d/d2/Flag_of_Ukraine.png", url:"https://sportkastv.blogspot.com/2026/06/html-body-margin-0-padding-0-width-100_0753842376.html"},
 {name:"Stream 2", flag:"https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg", url:"https://sportkastv.blogspot.com/2026/06/2-vs.html"},
 {name:"Stream 3", flag:"https://upload.wikimedia.org/wikipedia/commons/9/99/Flag_of_Germany.svg", url:"https://kasta-sports.vercel.app/wc-player.html"}
];

const player=document.getElementById("player");
const menu=document.getElementById("liveMenu");

let current=0;
let timer=null;

function load(i){
    current=i;
    player.innerHTML="";

    const iframe=document.createElement("iframe");
    iframe.src=streams[i].url;
    iframe.allow="autoplay; fullscreen";
    iframe.allowFullscreen=true;

    player.appendChild(iframe);

    updateActive();
}

function build(){
    streams.forEach((s,i)=>{
        const b=document.createElement("div");
        b.className="live-btn";

        const img=document.createElement("img");
        img.src=s.flag;
        img.style.width="18px";

        const t=document.createElement("span");
        t.innerText=s.name;

        b.appendChild(img);
        b.appendChild(t);

        b.onclick=()=>{
            load(i);
            showMenu(); // не ховаємо одразу
        };

        menu.appendChild(b);
    });

    updateActive();
}

function updateActive(){
    document.querySelectorAll(".live-btn").forEach((b,i)=>{
        b.classList.toggle("active",i===current);
    });
}

/* ===== TAP CONTROL (ВАЖЛИВО) ===== */
function showMenu(){
    menu.classList.add("show");

    clearTimeout(timer);
    timer=setTimeout(()=>{
        menu.classList.remove("show");
    },3000);
}

/* ловимо ТІЛЬКИ wrapper */
document.getElementById("player-wrapper")
.addEventListener("click", showMenu);

build();
load(0);
</script>
