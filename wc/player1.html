<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>

/* ===== PAGE ===== */
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    overflow: hidden;
    height: 100%;
}

/* ===== PLAYER ===== */
#player-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
}

#player {
    width: 100%;
    height: 100%;
}

iframe {
    width: 100%;
    height: 100%;
    border: 0;
}

/* ===== MENU OVER PLAYER ===== */
#liveMenu {
    position: fixed;
    top: 10px;
    left: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 99999;

    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
}

#liveMenu.show {
    opacity: 1;
    pointer-events: auto;
}

.live-btn {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 8px 10px;
    border-radius: 8px;
    font-family: Arial;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    gap: 6px;
    align-items: center;
}

.live-btn img {
    width: 18px;
    height: 12px;
}

.live-btn.active {
    border-color: red;
    color: red;
}

</style>
</head>

<body>

<div id="player-wrapper">
    <div id="player"></div>
</div>

<div id="liveMenu"></div>

<script>

const streams = [
    {
        name: "Stream 1",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Flag_of_Ukraine.png/330px-Flag_of_Ukraine.png",
        url: "https://sportkastv.blogspot.com/2026/06/html-body-margin-0-padding-0-width-100_0753842376.html"
    },
    {
        name: "Stream 2",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg/330px-Flag_of_the_United_Kingdom_%283-5%29.svg.png",
        url: "https://sportkastv.blogspot.com/2026/06/2-vs.html"
    },
    {
        name: "Stream 3",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Flag_of_Germany.svg/330px-Flag_of_Germany.svg.png",
        url: "https://kasta-sports.vercel.app/wc-player.html"
    }
];

const player = document.getElementById("player");
const menu = document.getElementById("liveMenu");

let current = 0;
let hideTimer = null;

/* ===== LOAD STREAM ===== */
function loadStream(i) {
    current = i;

    player.innerHTML = "";

    const iframe = document.createElement("iframe");
    iframe.src = streams[i].url;
    iframe.allow = "autoplay; fullscreen";
    iframe.allowFullscreen = true;

    player.appendChild(iframe);

    updateActive();
}

/* ===== MENU BUILD ===== */
function buildMenu() {
    streams.forEach((s, i) => {
        const btn = document.createElement("div");
        btn.className = "live-btn";

        const img = document.createElement("img");
        img.src = s.flag;

        const text = document.createElement("span");
        text.textContent = s.name;

        btn.appendChild(img);
        btn.appendChild(text);

        btn.onclick = (e) => {
            e.stopPropagation(); // ❗ важливо щоб тап не перехоплював player
            loadStream(i);
            showMenu();
        };

        menu.appendChild(btn);
    });

    updateActive();
}

/* ===== ACTIVE ===== */
function updateActive() {
    document.querySelectorAll(".live-btn").forEach((b, i) => {
        b.classList.toggle("active", i === current);
    });
}

/* ===== SHOW / HIDE MENU ===== */
function showMenu() {
    menu.classList.add("show");

    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
        menu.classList.remove("show");
    }, 3000);
}

/* ===== TAP ON PLAYER SHOWS MENU ===== */
document.getElementById("player-wrapper").addEventListener("click", showMenu);

/* ===== INIT ===== */
buildMenu();
loadStream(0);

</script>

</body>
</html>
