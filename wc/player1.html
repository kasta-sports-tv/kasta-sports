<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

body {
    position: fixed;
    inset: 0;
}

/* PLAYER */
#player-wrapper {
    position: absolute;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
}

#player {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: #000;
}

#player iframe {
    width: 100%;
    height: 100%;
    border: 0;
}

/* POSTER */
#myImage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    z-index: 50;
    background: #000;
    transition: opacity 0.6s ease;
}

/* SPINNER */
#spinner {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 50px;
    height: 50px;
    margin: -25px 0 0 -25px;
    border: 5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    z-index: 60;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* MENU */
#liveMenu {
    position: absolute;
    left: 12px;
    top: 40%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 999999;
    opacity: 0;
    pointer-events: none;
    transition: .25s ease;
}

#liveMenu.show {
    opacity: 1;
    pointer-events: auto;
}

.live-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    font-family: Arial;
    font-size: 14px;
    cursor: pointer;
    border-radius: 10px;
}

.live-btn img {
    width: 18px;
    height: 12px;
    object-fit: cover;
}

.live-btn.active {
    border-color: red;
    color: red;
}

@media (max-width: 768px) {
    #liveMenu {
        left: 10px;
        gap: 6px;
    }
    .live-btn {
        font-size: 12px;
        padding: 7px 10px;
    }
}
</style>
</head>

<body>

<div id="player-wrapper">

    <div id="player"></div>

    <img id="myImage"
         src="https://terrikon.com/i/0/1200/logos/tourns/fifa_world_cup2026.jpg">

    <div id="spinner"></div>

    <div id="liveMenu"></div>

</div>

<script>
const streams = [
    {
        name: "Stream 1",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Flag_of_Ukraine.png/330px-Flag_of_Ukraine.png",
        url: "https://bitcdn-kronehit.bitmovin.com/v2/hls/chunklist.m3u8"
    },
    {
        name: "Stream 2",
        flag: "https://img.magnific.com/free-photo/abstract-surface-textures-white-concrete-stone-wall_74190-8189.jpg",
        url: "https://sportkastv.blogspot.com/2026/06/html-body-margin-0-padding-0-width-100_0753842376.html"
    },
    {
        name: "Stream 3",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg/330px-Flag_of_the_United_Kingdom_%283-5%29.svg.png",
        url: "https://sportkastv.blogspot.com/2026/06/2-vs.html"
    }
];

let current = 0;
const menu = document.getElementById("liveMenu");

function loadStream(i) {
    current = i;

    const player = document.getElementById("player");

    player.innerHTML = `
        <iframe src="${streams[i].url}" allowfullscreen></iframe>
    `;

    updateActive();
}

/* MENU */
function buildMenu() {
    menu.innerHTML = "";

    streams.forEach((s, i) => {
        const btn = document.createElement("div");
        btn.className = "live-btn";

        const img = document.createElement("img");
        img.src = s.flag;

        const text = document.createElement("span");
        text.textContent = " " + s.name;

        btn.appendChild(img);
        btn.appendChild(text);

        btn.onclick = () => loadStream(i);

        menu.appendChild(btn);
    });

    updateActive();
}

function updateActive() {
    document.querySelectorAll(".live-btn").forEach((btn, i) => {
        btn.classList.toggle("active", i === current);
    });
}

/* MENU SHOW */
let hideTimer;

function showMenu() {
    menu.classList.add("show");
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
        menu.classList.remove("show");
    }, 3000);
}

document.addEventListener("pointerdown", showMenu);

/* INIT */
buildMenu();
loadStream(0);

/* FIX: прибираємо спінер + постер нормально */
window.addEventListener("load", () => {
    setTimeout(() => {
        const img = document.getElementById("myImage");
        const spinner = document.getElementById("spinner");

        if (img) img.style.display = "none";
        if (spinner) spinner.style.display = "none";
    }, 1500);
});
</script>

</body>
</html>
