<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    width: 100%;
    height: 100%;
    overflow: hidden;
}

/* ===== PLAYER ===== */
#player {
    position: absolute;
    inset: 0;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* ===== OVERLAY WRAPPER (НЕ ЛАМАЄ КЛІКИ) ===== */
#ui {
    position: absolute;
    inset: 0;
    pointer-events: none; /* 🔥 ключ */
}

/* ===== MENU ===== */
#menu {
    position: absolute;
    top: 20%;
    left: 12px;

    display: flex;
    flex-direction: column;
    gap: 10px;

    opacity: 0;
    transform: translateX(-10px);
    transition: 0.25s ease;

    pointer-events: none;
}

#menu.show {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto; /* включається тільки коли видно */
}

.btn {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;

    padding: 10px 12px;
    border-radius: 10px;

    font-family: Arial;
    font-size: 14px;

    display: flex;
    align-items: center;
    gap: 8px;

    cursor: pointer;
}

.btn img {
    width: 18px;
    height: 12px;
}

/* ===== hidden tap layer ===== */
#tapLayer {
    position: absolute;
    inset: 0;
    background: transparent;
}
</style>
</head>

<body>

<div id="player"></div>

<div id="ui">

    <div id="menu"></div>

    <div id="tapLayer"></div>

</div>

<script>
const streams = [
    {
        name: "Stream 1",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Flag_of_Ukraine.png/330px-Flag_of_Ukraine.png",
        url: "https://sportkastv.blogspot.com/2026/06/2-vs.html"
    },
    {
        name: "Stream 2",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg/330px-Flag_of_the_United_Kingdom_%283-5%29.svg.png",
        url: "https://kasta-sports.vercel.app/wc-player.html"
    },
    {
        name: "Stream 3",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/99/Flag_of_Germany.svg/330px-Flag_of_Germany.svg.png",
        url: "https://example.com"
    }
];

const player = document.getElementById("player");
const menu = document.getElementById("menu");
const tapLayer = document.getElementById("tapLayer");

let current = 0;
let hideTimer;

/* ===== LOAD ===== */
function load(i) {
    current = i;

    player.innerHTML = `
        <iframe src="${streams[i].url}" allowfullscreen></iframe>
    `;

    renderMenu();
}

/* ===== MENU BUILD ===== */
function renderMenu() {
    menu.innerHTML = "";

    streams.forEach((s, i) => {
        const b = document.createElement("div");
        b.className = "btn";
        b.innerHTML = `<img src="${s.flag}"> ${s.name}`;

        b.onclick = () => load(i);

        if (i === current) b.style.borderColor = "red";

        menu.appendChild(b);
    });
}

/* ===== SHOW/HIDE LOGIC ===== */
function showMenu() {
    menu.classList.add("show");

    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
        menu.classList.remove("show");
    }, 3000);
}

/* tap + mouse */
tapLayer.addEventListener("click", showMenu);
document.addEventListener("mousemove", showMenu);

/* INIT */
renderMenu();
load(0);
</script>

</body>
</html>
