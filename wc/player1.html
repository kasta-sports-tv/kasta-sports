<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>

/* ================= RESET ================= */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
}

/* ================= WRAPPER ================= */
#player-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    aspect-ratio: 16 / 9;
    background: #000;
    overflow: hidden;
}

/* ================= PLAYER ================= */
#player {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
}

/* iframe/video */
iframe, video {
    width: 100%;
    height: 100%;
    border: 0;
}

/* ================= MENU ================= */
#liveMenu {
    position: absolute;
    left: 12px;
    top: 40%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 9999;

    opacity: 0;
    pointer-events: none;
    transition: 0.25s ease;
}

#liveMenu.show {
    opacity: 1;
    pointer-events: auto;
}

/* ================= BUTTON ================= */
.live-btn {
    display: flex;
    align-items: center;
    gap: 8px;

    padding: 10px 12px;
    border-radius: 10px;

    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(255,255,255,0.25);

    color: #fff;
    font-family: Arial;
    font-size: 14px;

    cursor: pointer;
    user-select: none;
}

.live-btn img {
    width: 18px;
    height: 12px;
    object-fit: cover;
}

.live-btn.active {
    border-color: red;
    color: red;
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {
    .live-btn {
        font-size: 12px;
        padding: 7px 10px;
    }
}

</style>
</head>

<body>

<div id="player-wrapper">

    <div id="player"></div>

    <div id="liveMenu"></div>

</div>

<script>

const streams = [
    {
        name: "Stream 1",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d2/Flag_of_Ukraine.png/330px-Flag_of_Ukraine.png",
        url: "https://bitcdn-kronehit.bitmovin.com/v2/hls/chunklist.m3u8"
    },
    {
        name: "Stream 2",
        flag: "https://img.magnific.com/free-photo/abstract-surface-textures-white-concrete-stone-wall_74190-8189.jpg",
        url: "https://mf.kasta-sports-tv.workers.dev/?url=https://t5.ultrastream.vip/mtv_laliga/index.m3u8"
    },
    {
        name: "Stream 3",
        flag: "https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg/330px-Flag_of_the_United_Kingdom_%283-5%29.svg.png",
        url: "https://cinebolt.net/api/iptv-proxy?url=http://50.7.120.34:8080/TVI/index.m3u8"
    }
];

let current = 0;
let hideTimer = null;

const menu = document.getElementById("liveMenu");
const wrapper = document.getElementById("player-wrapper");

/* ================= LOAD STREAM ================= */
function loadStream(i) {
    current = i;

    document.getElementById("player").innerHTML = "";

    new Playerjs({
        id: "player",
        file: streams[i].url,
        autoplay: 0,
        lang: "en"
    });

    updateActive();
}

/* ================= MENU BUILD ================= */
function buildMenu() {
    menu.innerHTML = "";

    streams.forEach((s, i) => {
        const btn = document.createElement("div");
        btn.className = "live-btn";

        const img = document.createElement("img");
        img.src = s.flag;

        const text = document.createElement("span");
        text.textContent = s.name;

        btn.appendChild(img);
        btn.appendChild(text);

        btn.onclick = (e) => {
            e.stopPropagation();
            loadStream(i);
            showMenu();
        };

        menu.appendChild(btn);
    });

    updateActive();
}

/* ================= ACTIVE ================= */
function updateActive() {
    document.querySelectorAll(".live-btn").forEach((b, i) => {
        b.classList.toggle("active", i === current);
    });
}

/* ================= SHOW / HIDE ================= */
function showMenu() {
    menu.classList.add("show");

    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
        menu.classList.remove("show");
    }, 3000);
}

/* ================= TAP ON PLAYER ================= */
wrapper.addEventListener("click", () => {
    if (menu.classList.contains("show")) {
        menu.classList.remove("show");
        clearTimeout(hideTimer);
    } else {
        showMenu();
    }
});

/* ================= INIT ================= */
buildMenu();

window.addEventListener("load", () => {
    loadStream(0);
});

</script>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

</body>
</html>
