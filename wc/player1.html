<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>

/* ===== RESET ===== */
html,body{
    margin:0;
    padding:0;
    background:#000;
    height:100%;
    overflow:hidden;
}

/* ===== PLAYER WRAPPER ===== */
#player-wrapper{
    position:absolute;
    inset:0;
}

/* ===== PLAYER ===== */
#player{
    position:absolute;
    inset:0;
}

#player iframe{
    width:100%;
    height:100%;
    border:0;
}

/* ===== MENU ===== */
#liveMenu{
    position:absolute;
    left:12px;
    top:40%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:10px;

    z-index:99999;

    opacity:0;
    visibility:hidden;
    pointer-events:none;

    transition:0.25s ease;
}

#liveMenu.show{
    opacity:1;
    visibility:visible;
    pointer-events:auto;
}

.live-btn{
    display:flex;
    align-items:center;
    gap:8px;

    padding:10px 12px;
    border-radius:10px;

    background:rgba(0,0,0,0.6);
    border:1px solid rgba(255,255,255,0.25);

    color:#fff;
    font-family:Arial;
    font-size:14px;

    cursor:pointer;
}

.live-btn img{
    width:18px;
    height:12px;
}

.live-btn.active{
    border-color:red;
    color:red;
}

/* mobile */
@media(max-width:768px){
    .live-btn{
        font-size:12px;
        padding:7px 10px;
    }
}

</style>
</head>

<body>

<div id="player-wrapper">
    <div id="player"></div>
    <div id="liveMenu"></div>
</div>

<script>

const streams=[
  {
    name:"LIVE 1 UK",
    flag:"https://upload.wikimedia.org/wikipedia/commons/d/d2/Flag_of_Ukraine.png",
    url:"https://sportkastv.blogspot.com/2026/06/html-body-margin-0-padding-0-width-100_0753842376.html"
  },
  {
    name:"LIVE 2 RU",
    flag:"https://upload.wikimedia.org/wikipedia/commons/8/83/Flag_of_the_United_Kingdom_%283-5%29.svg",
    url:"https://sportkastv.blogspot.com/2026/06/2-vs.html"
  },
  {
    name:"LIVE 3",
    flag:"https://upload.wikimedia.org/wikipedia/commons/9/99/Flag_of_Germany.svg",
    url:"https://kasta-sports.vercel.app/wc-player.html"
  }
];

const player=document.getElementById("player");
const menu=document.getElementById("liveMenu");

let current=0;
let timer=null;

/* ===== LOAD STREAM ===== */
function load(i){
    current=i;

    player.innerHTML="";

    const iframe=document.createElement("iframe");
    iframe.src=streams[i].url;
    iframe.allow="autoplay; fullscreen";
    iframe.allowFullscreen=true;

    player.appendChild(iframe);

    updateActive();
}

/* ===== MENU BUILD ===== */
function buildMenu(){
    streams.forEach((s,i)=>{
        const btn=document.createElement("div");
        btn.className="live-btn";

        const img=document.createElement("img");
        img.src=s.flag;

        const text=document.createElement("span");
        text.textContent=s.name;

        btn.appendChild(img);
        btn.appendChild(text);

        btn.onclick=()=>{
            load(i);
            showMenu();
        };

        menu.appendChild(btn);
    });

    updateActive();
}

/* ===== ACTIVE STATE ===== */
function updateActive(){
    document.querySelectorAll(".live-btn").forEach((b,i)=>{
        b.classList.toggle("active", i===current);
    });
}

/* ===== SHOW / HIDE MENU ===== */
function showMenu(){
    menu.classList.add("show");

    clearTimeout(timer);
    timer=setTimeout(()=>{
        menu.classList.remove("show");
    },3000);
}

/* ===== FIX: TAP ALWAYS WORKS (MOB + PC) ===== */
const wrapper=document.getElementById("player-wrapper");

wrapper.addEventListener("pointerdown", showMenu, true);
wrapper.addEventListener("touchstart", showMenu, true);
wrapper.addEventListener("click", showMenu, true);

/* INIT */
buildMenu();
load(0);

</script>

</body>
</html>
