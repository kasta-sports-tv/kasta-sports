<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #player-wrapper {
      position: fixed;
      inset: 0;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    #myImage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease;
    }

    /* 🔥 COMET LOADER FIX */
    #spinner {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 64px;
      height: 64px;
      margin: -32px 0 0 -32px;
      z-index: 10000;
      display: block;
    }

    #spinner svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      animation: rotate 2.8s linear infinite; /* повільніше */
    }

    .track {
      fill: none;
      stroke: rgba(255,0,0,0.15);
      stroke-width: 4;
    }

    .loader {
      fill: none;
      stroke: red;
      stroke-width: 4;
      stroke-linecap: round;

      /* 🔥 ключ до “комети” */
      stroke-dasharray: 20 140;
      stroke-dashoffset: 0;

      filter: drop-shadow(0 0 6px red);
      animation: dash 2.6s ease-in-out infinite;
    }

    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }

    @keyframes dash {
      0% {
        stroke-dasharray: 10 150;
        stroke-dashoffset: 0;
        opacity: 0.5;
      }
      50% {
        stroke-dasharray: 90 70;
        stroke-dashoffset: -25;
        opacity: 1;
      }
      100% {
        stroke-dasharray: 10 150;
        stroke-dashoffset: -160;
        opacity: 0.5;
      }
    }
  </style>
</head>

<body>

<img id="myImage" src="https://www.betaura.com.ua/wp-content/uploads/2026/04/shakhtar_crystal_palace-1536x864.webp">

<div id="spinner">
  <svg viewBox="0 0 50 50">
    <circle class="track" cx="25" cy="25" r="20"></circle>
    <circle class="loader" cx="25" cy="25" r="20"></circle>
  </svg>
</div>

<div id="player-wrapper">
  <div id="player"></div>
</div>

<script>
  const image = document.getElementById("myImage");
  const spinner = document.getElementById("spinner");

  spinner.style.display = "block";

  // 🔥 заставка 4 сек
  setTimeout(() => {
    image.style.opacity = 0;
    setTimeout(() => image.style.display = "none", 1000);
  }, 4000);

  // 🔥 fallback щоб НЕ висів вічно
  setTimeout(() => {
    spinner.style.opacity = 0;
    setTimeout(() => spinner.style.display = "none", 500);
  }, 8000);
</script>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

<script>
  var player = new Playerjs({
    id: "player",
    file: "https://live-embed.supertennix.hiway.media/restreamer/supertennix_client/gpu-a-c0-16/restreamer/outgest/aa3673f1-e178-44a9-a947-ef41db73211a/manifest.m3u8",
    poster: "",
    autoplay: 0,
    lang: "en"
  });
</script>

</body>
</html>
