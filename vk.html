<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
}

#player {
  width: 100%;
  height: 100%;
  position: relative;
}

/* PlayerJS відео */
#player video {
  width: 100% !important;
  height: 100% !important;
  object-fit: contain !important;
  background: black;
}

/* твій постер */
#poster {
  position: absolute;
  inset: 0;
  background: url('https://www.betaura.com.ua/wp-content/uploads/2026/04/shakhtar_crystal_palace-1536x864.webp') center/cover no-repeat;
  z-index: 999;
  opacity: 1;
  transition: opacity 1.2s ease;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="player">
  <div id="poster"></div>
</div>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

<script>
var player = new Playerjs({
  id: "player",
  file: "https://live-embed.supertennix.hiway.media/restreamer/supertennix_client/gpu-a-c0-16/restreamer/outgest/aa3673f1-e178-44a9-a947-ef41db73211a/manifest.m3u8",
  poster: "",
  autoplay: 0,
  lang: "en"
});

const poster = document.getElementById("poster");

function bindClick() {
  const container = document.getElementById("player");

  container.addEventListener("click", () => {

    // даємо PlayerJS стартанути
    setTimeout(() => {

      // плавний fade (НЕ display none!)
      poster.style.opacity = "0";

      // після fade прибираємо
      setTimeout(() => {
        poster.style.display = "none";
      }, 1200);

    }, 300);

  }, { once: true }); // тільки перший Play
}

bindClick();
</script>

</body>
</html>
