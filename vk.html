<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #player-wrapper {
      position: fixed;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #player {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #player video {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
    }

    /* 🔥 СВІЙ ПОСТЕР */
    #poster-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://www.betaura.com.ua/wp-content/uploads/2026/04/shakhtar_crystal_palace-1536x864.webp') center/cover no-repeat;
      z-index: 5;
      opacity: 1;
      transition: opacity 1s ease;
      pointer-events: none; /* не блокує кнопку */
    }

    /* 🔄 спінер */
    #spinner {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 50px;
      height: 50px;
      margin: -25px;
      border: 6px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      z-index: 6;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.5s;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ❌ Ховаємо панель ДО старту */
    .hide-controls .pjs-controls {
      opacity: 0 !important;
      pointer-events: none !important;
    }
  </style>
</head>

<body>

<div id="player-wrapper">
  <div id="player">
    <div id="poster-overlay"></div>
    <div id="spinner"></div>
  </div>
</div>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

<script>
  var vs = {
    id: "player",
    file: "https://live-embed.supertennix.hiway.media/restreamer/supertennix_client/gpu-a-c0-16/restreamer/outgest/aa3673f1-e178-44a9-a947-ef41db73211a/manifest.m3u8",
    autoplay: 0,
    poster: "",
    lang: "en"
  };

  var player = new Playerjs(vs);

  const spinner = document.getElementById("spinner");
  const poster = document.getElementById("poster-overlay");
  const playerEl = document.getElementById("player");

  // 🔥 ховаємо панель поки не стартував
  playerEl.classList.add("hide-controls");

  // стартовий спінер (короткий)
  setTimeout(() => {
    spinner.style.opacity = 0;
    setTimeout(() => spinner.style.display = "none", 500);
  }, 800);

  function waitForVideo() {
    const video = document.querySelector("#player video");

    if (video) {

      video.addEventListener("playing", () => {
        // показуємо контролі
        playerEl.classList.remove("hide-controls");

        // плавно ховаємо постер
        poster.style.opacity = 0;
        setTimeout(() => poster.style.display = "none", 1000);

        // ховаємо спінер
        spinner.style.opacity = 0;
        setTimeout(() => spinner.style.display = "none", 500);
      });

      video.addEventListener("waiting", () => {
        spinner.style.display = "block";
        spinner.style.opacity = 1;
      });

    } else {
      setTimeout(waitForVideo, 300);
    }
  }

  waitForVideo();
</script>

</body>
</html>
