<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #player-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
    }

    #player {
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
      position: relative;
    }

    #player video,
    #player iframe {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
      background: black;
    }

    #player img {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
    }

    /* 🖼 постер */
    #myImage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease-out;
      object-fit: cover;
      pointer-events: none; /* 🔥 ГОЛОВНИЙ ФІКС */
    }

    #spinner {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 50px;
      height: 50px;
      margin: -25px 0 0 -25px;
      border: 6px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      z-index: 10000;
      animation: spin 1s linear infinite;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<img id="myImage" src="https://www.betaura.com.ua/wp-content/uploads/2026/04/shakhtar_crystal_palace-1536x864.webp">
<div id="spinner"></div>

<div id="player-wrapper">
  <div id="player"></div>
</div>

<script>
  const image = document.getElementById("myImage");
  const spinner = document.getElementById("spinner");

  // стартовий спінер
  spinner.style.display = "block";

  setTimeout(() => {
    spinner.style.opacity = 0;
    setTimeout(() => spinner.style.display = "none", 500);
  }, 1000);

  function fadeOutPoster() {
    image.style.opacity = 0;
    setTimeout(() => {
      image.style.display = "none";
    }, 1000);
  }

  function waitForVideo() {
    const video = document.querySelector("#player video");

    if (video) {

      video.addEventListener("playing", () => {
        fadeOutPoster();
        spinner.style.opacity = 0;
        setTimeout(() => spinner.style.display = "none", 500);
      });

      video.addEventListener("waiting", () => {
        spinner.style.display = "block";
        spinner.style.opacity = 1;
      });

    } else {
      setTimeout(waitForVideo, 300);
    }
  }

  waitForVideo();
</script>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

<script>

</script>

</body>
</html>
