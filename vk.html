<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #player-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      background: black;
    }

    #player {
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
      position: relative;
    }

    #player video,
    #player iframe {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
      background: black;
    }

    #player img {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
    }

    /* 🔥 FIX: заставка тепер в межах плеєра */
    #myImage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease-out;
      object-fit: cover;
    }

    /* 🔥 СПІНЕР (як було) */
    #spinner {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 56px;
      height: 56px;
      margin: -28px 0 0 -28px;
      z-index: 10000;

      border-radius: 50%;
      border: 4px solid rgba(255, 0, 0, 0.2);
      border-top-color: red;

      animation: spin 1.6s linear infinite;
      transition: opacity 1s ease;
    }

    #spinner::after {
      content: "";
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top-color: red;
      border-right-color: rgba(255,0,0,0.6);
      filter: drop-shadow(0 0 6px red);
      animation: dash 1.6s ease-in-out infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    @keyframes dash {
      0%   { transform: rotate(0deg) scale(0.85); opacity: 0.6; }
      50%  { transform: rotate(180deg) scale(1); opacity: 1; }
      100% { transform: rotate(360deg) scale(0.85); opacity: 0.6; }
    }
  </style>
</head>

<body>

<div id="player-wrapper">
  <img id="myImage" src="https://www.betaura.com.ua/wp-content/uploads/2026/04/shakhtar_crystal_palace-1536x864.webp">
  <div id="spinner"></div>
  <div id="player"></div>
</div>

<script>
  const image = document.getElementById("myImage");
  const spinner = document.getElementById("spinner");

  setTimeout(() => {
    image.style.opacity = 0;
    spinner.style.opacity = 0;

    setTimeout(() => {
      image.style.display = "none";
      spinner.style.display = "none";
    }, 1000);

  }, 3000);
</script>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

<script>
  var vs = {
    id: "player",
    file: "https://live-embed.supertennix.hiway.media/restreamer/supertennix_client/gpu-a-c0-16/restreamer/outgest/aa3673f1-e178-44a9-a947-ef41db73211a/manifest.m3u8",
    poster: "",
    autoplay: 0,
    lang: "en"
  };

  var player = new Playerjs(vs);
</script>

</body>
</html>
