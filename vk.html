<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #player-wrapper {
      position: fixed;
      width: 100vw;
      height: 100vh;
    }

    #player {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #player video,
    #player iframe {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
      background: black;
    }

    /* 🎯 ПОСТЕР */
    #poster-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('https://www.betaura.com.ua/wp-content/uploads/2026/04/shakhtar_crystal_palace-1536x864.webp') center/cover no-repeat;
      z-index: 10;
      opacity: 1;
      transition: opacity 1s ease;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div id="player-wrapper">
  <div id="player">
    <div id="poster-overlay"></div>
  </div>
</div>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

<script>
  var vs = {
    id: "player",
    file: "https://live-embed.supertennix.hiway.media/restreamer/supertennix_client/gpu-a-c0-16/restreamer/outgest/aa3673f1-e178-44a9-a947-ef41db73211a/manifest.m3u8",
    poster: "",
    autoplay: 0,
    lang: "en"
  };

  var player = new Playerjs(vs);

  const poster = document.getElementById("poster-overlay");

  function attachPlayListener() {
    const video = document.querySelector("#player video");

    if (!video) {
      setTimeout(attachPlayListener, 300);
      return;
    }

    // 🎯 САМИЙ СТАБІЛЬНИЙ ВАРІАНТ — клік Play
    video.addEventListener("play", () => {
      poster.style.opacity = "0";

      setTimeout(() => {
        poster.style.display = "none";
      }, 1000);
    });

    // додатково: будь-який клік по плеєру теж прибирає постер (страховка)
    document.getElementById("player").addEventListener("click", () => {
      poster.style.opacity = "0";
      setTimeout(() => {
        poster.style.display = "none";
      }, 1000);
    });
  }

  attachPlayListener();
</script>

</body>
</html>
