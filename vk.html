<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #player-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: black;
    }

    #player {
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
      position: relative;
    }

    #player video,
    #player iframe {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain !important;
      background: black;
    }

    #myImage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease-out;
      object-fit: cover;
    }

    /* 🔥 JW / Netflix STYLE SPINNER */
    #spinner {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 60px;
      height: 60px;
      margin: -30px 0 0 -30px;
      z-index: 10000;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #spinner svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      animation: rotate 2.2s linear infinite; /* 🔥 повільно */
    }

    .track {
      fill: none;
      stroke: rgba(255, 0, 0, 0.15);
      stroke-width: 4;
    }

    .loader {
      fill: none;
      stroke: red;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-dasharray: 80;
      stroke-dashoffset: 60;
      filter: drop-shadow(0 0 6px red);
      animation: dash 2.4s ease-in-out infinite;
    }

    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }

    @keyframes dash {
      0%   { stroke-dasharray: 10 120; stroke-dashoffset: 0; opacity: 0.6; }
      50%  { stroke-dasharray: 70 60;  stroke-dashoffset: -20; opacity: 1; }
      100% { stroke-dasharray: 10 120; stroke-dashoffset: -120; opacity: 0.6; }
    }
  </style>
</head>

<body>

<img id="myImage" src="https://www.betaura.com.ua/wp-content/uploads/2026/04/shakhtar_crystal_palace-1536x864.webp">

<!-- 🔥 SPINNER -->
<div id="spinner">
  <svg viewBox="0 0 50 50">
    <circle class="track" cx="25" cy="25" r="20"></circle>
    <circle class="loader" cx="25" cy="25" r="20"></circle>
  </svg>
</div>

<div id="player-wrapper">
  <div id="player"></div>
</div>

<script>
  const image = document.getElementById("myImage");
  const spinner = document.getElementById("spinner");

  // 🔥 стартова заставка 4 сек
  setTimeout(() => {
    image.style.opacity = 0;
    spinner.style.opacity = 0;

    setTimeout(() => {
      image.style.display = "none";
      spinner.style.display = "none";
    }, 1000);

  }, 4000);
</script>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

<script>
  var player = new Playerjs({
    id: "player",
    file: "https://live-embed.supertennix.hiway.media/restreamer/supertennix_client/gpu-a-c0-16/restreamer/outgest/aa3673f1-e178-44a9-a947-ef41db73211a/manifest.m3u8",
    poster: "",
    autoplay: 0,
    lang: "en"
  });

  const spinner = document.getElementById("spinner");

  function showLoader() {
    spinner.style.opacity = "1";
  }

  function hideLoader() {
    spinner.style.opacity = "0";
  }

  function bindBufferEvents() {
    const tryFindVideo = setInterval(() => {
      const video = document.querySelector("#player video");

      if (video) {

        // 🔥 буфер
        video.addEventListener("waiting", showLoader);
        video.addEventListener("stalled", showLoader);

        // 🔥 відновлення
        video.addEventListener("playing", hideLoader);
        video.addEventListener("canplay", hideLoader);

        clearInterval(tryFindVideo);
      }
    }, 300);
  }

  bindBufferEvents();
</script>

</body>
</html>
