<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #player-wrapper {
      position: fixed;
      inset: 0;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    #myImage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease;
    }

    /* 🔥 ПРОСТИЙ СПІНЕР (повільніший) */
    #spinner {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 50px;
      height: 50px;
      margin: -25px 0 0 -25px;
      border: 5px solid rgba(255,255,255,0.25);
      border-top-color: red;
      border-radius: 50%;
      z-index: 10000;
      animation: spin 1.8s linear infinite; /* 🔥 повільніше */
      transition: opacity 0.5s ease;
      display: block;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>

<img id="myImage" src="https://www.betaura.com.ua/wp-content/uploads/2026/04/shakhtar_crystal_palace-1536x864.webp">

<div id="spinner"></div>

<div id="player-wrapper">
  <div id="player"></div>
</div>

<script>
  const image = document.getElementById("myImage");
  const spinner = document.getElementById("spinner");

  spinner.style.display = "block";

  // 🔥 заставка 3 сек
  setTimeout(() => {
    image.style.opacity = 0;
    setTimeout(() => image.style.display = "none", 1000);
  }, 3000);
</script>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

<script>
  var player = new Playerjs({
    id: "player",
    file: "https://live-embed.supertennix.hiway.media/restreamer/supertennix_client/gpu-a-c0-16/restreamer/outgest/aa3673f1-e178-44a9-a947-ef41db73211a/manifest.m3u8",
    poster: "",
    autoplay: 0,
    lang: "en"
  });

  const spinner = document.getElementById("spinner");

  function showSpinner() {
    spinner.style.opacity = "1";
  }

  function hideSpinner() {
    spinner.style.opacity = "0";
  }

  // 🔥 буферизація без прив’язки до SVG/Player DOM
  setInterval(() => {
    const video = document.querySelector("video");

    if (video) {
      video.addEventListener("waiting", showSpinner);
      video.addEventListener("stalled", showSpinner);

      video.addEventListener("playing", hideSpinner);
      video.addEventListener("canplay", hideSpinner);
    }
  }, 500);
</script>

</body>
</html>
