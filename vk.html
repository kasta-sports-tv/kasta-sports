<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background: black;
  overflow: hidden;
}

#player {
  width: 100%;
  height: 100%;
  position: relative;
}

/* PlayerJS постер НЕ чіпаємо — він сам */
#player video {
  width: 100% !important;
  height: 100% !important;
  object-fit: contain !important;
}

/* твій постер */
#poster {
  position: absolute;
  inset: 0;
  background: url('https://www.betaura.com.ua/wp-content/uploads/2026/04/shakhtar_crystal_palace-1536x864.webp') center/cover no-repeat;
  z-index: 999;
  opacity: 1;
  transition: opacity 1s ease;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="player">
  <div id="poster"></div>
</div>

<script src="https://kasta-sports-tv.github.io/iptv/vk-playerjs.js"></script>

<script>
var player = new Playerjs({
  id: "player",
  file: "https://live-embed.supertennix.hiway.media/restreamer/supertennix_client/gpu-a-c0-16/restreamer/outgest/aa3673f1-e178-44a9-a947-ef41db73211a/manifest.m3u8",
  poster: "",
  autoplay: 0,
  lang: "en"
});

const poster = document.getElementById("poster");

function watchPlayer() {
  const container = document.querySelector("#player");

  if (!container) {
    setTimeout(watchPlayer, 200);
    return;
  }

  const obs = new MutationObserver(() => {
    const video = container.querySelector("video");

    if (video && video.src) {

      // коли відео реально з’явилось у DOM
      const check = setInterval(() => {

        if (video.readyState >= 2 || video.currentTime > 0) {
          clearInterval(check);

          poster.style.opacity = "0";

          setTimeout(() => {
            poster.style.display = "none";
          }, 1000);
        }

      }, 150);
    }
  });

  obs.observe(container, { childList: true, subtree: true });
}

watchPlayer();
</script>

</body>
</html>
